        // --- FUNCIÓN DE COMPRESIÓN DE IMÁGENES ---
        const compressImage = (file, maxWidth = 800, maxHeight = 800, quality = 0.6) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                        } else {
                            if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                        }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        };

          const [showEmojiPicker, setShowEmojiPicker] = useState(false);
          const [activeReactionCommentId, setActiveReactionCommentId] = useState(null);
          
          const [editingCommentId, setEditingCommentId] = useState(null);
          const [editCommentText, setEditCommentText] = useState("");
          const [revealedComments, setRevealedComments] = useState({}); 
          const [historyOpenCid, setHistoryOpenCid] = useState(null); 
          const [showCommentModal, setShowCommentModal] = useState(false); 
          
          const [fullScreenImage, setFullScreenImage] = useState(null);

          const deadline = new Date(`${task.dueDate}T${task.dueTime || '23:59'}`);
          const isExpired = new Date() > deadline;
          const isLocked = task.type !== 'post' && isExpired && !task.allowLate;

          const cardStyle = isExpired && task.type !== 'post'
            ? "bg-red-900/10 backdrop-blur-2xl border border-red-500/40 shadow-[0_8px_32px_0_rgba(220,38,38,0.15)] rounded-3xl p-6 transition-all duration-300"
            : glassCard;

          const handleTranslate = async (lang) => {
            if (!commentText) return;
            setIsProcessing(true);
            const prompt = `Traduce el siguiente comentario al ${lang} de forma profesional y natural. Devuelve ÚNICAMENTE la traducción, sin explicaciones ni comillas:\n\n${commentText}`;
            const result = await callGemini(prompt);
            if (result) setCommentText(result);
            setIsProcessing(false);
          };

          const toggleReaction = async (type) => {
            if (isLocked || !currentUser) return;
            const newReactions = { ...(task.reactions || {}) };
            const currentReactionData = newReactions[currentUser.uid];
            const currentType = typeof currentReactionData === 'object' ? currentReactionData.type : currentReactionData;

            if (currentType === type) delete newReactions[currentUser.uid];
            else newReactions[currentUser.uid] = { type: type, name: loggedInName };
            
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { ...task, reactions: newReactions });
          };

          const toggleCommentReaction = async (commentId, emoji) => {
            if (isLocked || !currentUser) return;
            const updatedComments = (task.comments || []).map((c, i) => {
                const currentCid = c.id || `old-${i}`; 
                if (currentCid === commentId) {
                    const reactions = { ...(c.reactions || {}) };
                    const currentReact = reactions[currentUser.uid];
                    const currentEmoji = typeof currentReact === 'object' ? currentReact.emoji : currentReact;
                    
                    if (currentEmoji === emoji) {
                        delete reactions[currentUser.uid];
                    } else {
                        reactions[currentUser.uid] = { emoji: emoji, name: loggedInName };
                    }
                    return { ...c, reactions };
                }
                return c; 
            });
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { ...task, comments: updatedComments });
          };

          const handleDeleteComment = async (commentId, authorName) => {
              let updatedComments;
              if (role === 'teacher') {
                  updatedComments = task.comments.filter((c, i) => (c.id || `old-${i}`) !== commentId);
              } else {
                  updatedComments = task.comments.map((c, i) => 
                      (c.id || `old-${i}`) === commentId ? { ...c, isDeleted: true } : c
                  );
              }
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { ...task, comments: updatedComments });
          };
const handleSaveEditedTask = async () => {
              if (!editTaskData.title.trim() || !editTaskData.description.trim()) return showMessage("El título y la descripción no pueden estar vacíos.");
              try {
                  const updates = {
                      title: editTaskData.title.trim(),
                      description: editTaskData.description.trim()
                  };
                  if (task.type !== 'post') {
                      updates.dueDate = editTaskData.dueDate;
                      updates.dueTime = editTaskData.dueTime;
                      updates.allowLate = editTaskData.allowLate;
                  }
                  await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), updates);
                  setIsEditingTask(false);
                  showMessage("✅ Publicación actualizada.");
              } catch (error) {
                  showMessage("Hubo un error al actualizar.");
              }
          };
          const saveEditedComment = async () => {
              if (!editCommentText.trim()) return;
              const updatedComments = task.comments.map((c, i) => {
                  const cid = c.id || `old-${i}`;
                  if (cid === editingCommentId) {
                      const history = c.editHistory || [];
                      return { 
                          ...c, 
                          text: editCommentText.trim(), 
                          isEdited: true, 
                          editHistory: [{ text: c.text, date: Date.now() }, ...history] 
                      };
                  }
                  return c;
              });
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { ...task, comments: updatedComments });
              setEditingCommentId(null);
          };

          const handleLocalImageUpload = async (e) => {
              const file = e.target.files[0];
              if (!file) return;
              try {
                  setIsProcessing(true);
                  const compressed = await compressImage(file, 800, 800, 0.6);
                  const firebaseURL = await uploadImageToStorage(compressed, 'comments'); // Subimos a Storage
                  setCommentImageUrl(firebaseURL); // Guardamos solo la URL corta
                  setIsProcessing(false);
              } catch (error) {
                  showMessage("Hubo un error al procesar tu imagen.");
                  setIsProcessing(false);
              }
          };

          const handleAddComment = async (e) => {
            e.preventDefault();
            if(!commentText.trim() && !commentImageUrl.trim()) return;
            setIsProcessing(true);

            if (containsBadWords(commentText)) {
                showMessage("⚠️ Comentario bloqueado: Lenguaje inapropiado detectado.");
                setIsProcessing(false);
                return;
            }

            const newComment = { 
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5), 
                author: role === 'teacher' ? TEACHER_NAME : loggedInName, 
                text: commentText.trim(),
                imageUrl: commentImageUrl.trim(),
                isDeleted: false,
                reactions: {}
            };
            
            const newComments = [...(task.comments || []), newComment];
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { ...task, comments: newComments });
            setCommentText("");
            setCommentImageUrl(""); 
            setShowCommentImageInput(false);
            setShowAttachmentMenu(false);
            setShowEmojiPicker(false);
            setIsProcessing(false);
          };

          const renderReactions = () => {
            const counts = { like: 0, love: 0, sad: 0, happy: 0, wow: 0 };
            const namesByType = { like: [], love: [], sad: [], happy: [], wow: [] };

            Object.values(task.reactions || {}).forEach(r => { 
                const rType = typeof r === 'object' ? r.type : r;
                let rName = typeof r === 'object' ? r.name : 'Un usuario';
                if (rName === 'Profesora' || rName === 'La profe') rName = TEACHER_NAME;

                if (counts[rType] !== undefined) { 
                    counts[rType]++; 
                    namesByType[rType].push(rName);
                } 
            });

            return (
              <div className="flex gap-2 mt-4 flex-wrap">
                {Object.entries(REACTION_EMOJIS).map(([key, emoji]) => {
                  const rData = task.reactions?.[currentUser?.uid];
                  const userReactionType = typeof rData === 'object' ? rData.type : rData;
                  const isSelected = userReactionType === key;
                  const hoverText = namesByType[key].length > 0 ? `${namesByType[key].join(', ')} reaccionó así` : "";

                  return (
                    <button 
                      key={key} onClick={() => toggleReaction(key)} disabled={isLocked} title={hoverText}
                      className={`flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-bold transition-all border ${isSelected ? 'bg-white/60 border-[#AD3333] shadow-sm scale-105' : 'bg-white/30 border-white/40 hover:bg-white/50'} ${isLocked ? 'opacity-50 cursor-not-allowed' : ''}`}
                    >
                      {emoji} {counts[key] > 0 && <span className="text-gray-800">{counts[key]}</span>}
                    </button>
                  );
                })}
              </div>
            );
          };

          return (
            <div className={`${cardStyle} group ${!isLocked && 'hover:bg-white/30'}`}>
              <div className="flex justify-between items-start">
                <div className="flex-1 pr-4">
                  <div className="flex items-center gap-2 mb-1">
                      {task.type !== 'post' && (
                          <span className="text-[10px] font-black uppercase tracking-wider px-2 py-1 rounded-md bg-[#AD3333]/20 text-[#AD3333]">
                              Tarea
                          </span>
                      )}
                  </div>
                  {isEditingTask ? (
                      <input value={editTaskData.title} onChange={e => setEditTaskData({...editTaskData, title: e.target.value})} className={`${glassInput} text-xl font-bold mb-2 p-2`} placeholder="Título..." />
                  ) : (
                      <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                        {task.title} {isLocked && <Lock size={18} className="text-red-600" />}
                      </h3>
                  )}
                  {task.type !== 'post' && (
                      isEditingTask ? (
                          <div className="flex flex-wrap gap-2 mt-2 items-center">
                              <input type="date" value={editTaskData.dueDate} onChange={e => setEditTaskData({...editTaskData, dueDate: e.target.value})} className={`${glassInput} !py-1 px-2 text-sm w-auto`} />
                              <input type="time" value={editTaskData.dueTime} onChange={e => setEditTaskData({...editTaskData, dueTime: e.target.value})} className={`${glassInput} !py-1 px-2 text-sm w-auto`} />
                              <label className="flex items-center gap-1 cursor-pointer text-sm font-bold text-gray-700 ml-2">
                                  <input type="checkbox" checked={editTaskData.allowLate} onChange={e => setEditTaskData({...editTaskData, allowLate: e.target.checked})} className="w-4 h-4 accent-[#AD3333]" />
                                  Entregas tardías
                              </label>
                          </div>
                      ) : (
                          <p className={`text-sm font-bold mt-1 flex items-center gap-1 ${isExpired ? 'text-red-600' : 'text-[#AD3333]'}`}>
                            <Clock size={14} /> Vence: {task.dueDate} a las {task.dueTime || '23:59'} 
                            {isExpired && (task.allowLate ? " (Se aceptan entregas tardías)" : " (Cerrado)")}
                          </p>
                      )
                  )}
                </div>
                {role === 'teacher' && (
                  <div className="flex items-center gap-3 relative z-10 shrink-0">
                    {isEditingTask ? (
                        <>
                            <button onClick={handleSaveEditedTask} className="text-green-600 hover:text-green-700 hover:scale-110 transition-transform" title="Guardar"><CheckLine size={22}/></button>
                            <button onClick={() => {
                                setIsEditingTask(false);
                                setEditTaskData({title: task.title, description: task.description, dueDate: task.dueDate || '', dueTime: task.dueTime || '', allowLate: task.allowLate || false});
                            }} className="text-gray-400 hover:text-red-500 hover:scale-110 transition-transform" title="Cancelar"><XLine size={22}/></button>
                        </>
                    ) : (
                        <>
                            <button onClick={() => setIsEditingTask(true)} className="text-gray-400 hover:text-blue-600 transition" title="Editar">
                                <Edit3 size={20} />
                            </button>
                            <button onClick={() => confirmAction("¿Desea eliminar esta publicación definitivamente?", () => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id)))} className="text-gray-400 hover:text-red-600 transition">
                              <Trash2 size={20} />
                            </button>
                        </>
                    )}
                  </div>
                )}
              </div>
              {isEditingTask ? (
                  <textarea value={editTaskData.description} onChange={e => setEditTaskData({...editTaskData, description: e.target.value})} className={`${glassInput} mt-4 min-h-[120px] resize-none p-3`} placeholder="Descripción..."/>
              ) : (
                  <p className="mt-4 text-gray-800 whitespace-pre-wrap leading-relaxed">{task.description}</p>
              )}
              
              {task.imageUrl && (
                  <div className="mt-4 rounded-2xl overflow-hidden border border-white/40 shadow-sm max-w-full">
                      <img src={task.imageUrl} alt="Adjunto" onClick={() => setFullScreenImage(task.imageUrl)} className="w-full h-auto max-h-96 object-contain bg-black/5 cursor-pointer hover:opacity-90 transition-opacity" onError={(e) => e.target.style.display = 'none'} />
                  </div>
              )}

              {renderReactions()}

              <div className="mt-4 pt-4 border-t border-white/30">
                  <button
                      onClick={() => setShowCommentModal(true)}
                      className="w-full py-3 bg-white/40 hover:bg-white/60 border border-white/50 shadow-sm rounded-xl font-bold text-gray-800 transition-all flex justify-center items-center gap-2"
                  >
                      <FileText size={18} className="text-[#AD3333]" />
                      {task.comments?.length > 0 ? `Ver los ${task.comments.length} comentarios` : 'Sé el primero en comentar 💬'}
                  </button>
              </div>

              {/* MODAL DE COMENTARIOS AMPLIADO */}
              {showCommentModal && ReactDOM.createPortal(
                  <div className={`fixed inset-0 z-[9999] flex justify-center items-end md:items-center bg-black/70 backdrop-blur-md p-0 md:p-4 transition-all ${isDarkMode ? 'dark-mode' : ''}`}>
                      <div className={`w-full max-w-3xl h-[90vh] md:h-[85vh] flex flex-col p-4 md:p-6 rounded-t-[2rem] md:rounded-[2rem] shadow-2xl animate-in slide-in-from-bottom-10 fade-in duration-300 overflow-hidden ${isDarkMode ? 'bg-gray-900 border border-gray-700' : 'bg-gray-50 border border-gray-200'}`}>
                          
                          <div className={`flex justify-between items-center mb-4 border-b pb-4 shrink-0 ${isDarkMode ? 'border-gray-700' : 'border-gray-300'}`}>
                              <div>
                                  <h3 className={`text-xl font-extrabold flex items-center gap-2 ${isDarkMode ? 'text-gray-100' : 'text-gray-800'}`}>
                                      <FileText className="text-[#AD3333]" /> Comentarios
                                  </h3>
                                  <p className={`text-xs font-medium mt-1 truncate max-w-[250px] md:max-w-md ${isDarkMode ? 'text-gray-400' : 'text-gray-600'}`}>De: {task.title}</p>
                              </div>
                              <button onClick={() => setShowCommentModal(false)} className={`p-2 rounded-full transition-all shadow-sm ${isDarkMode ? 'text-gray-400 hover:text-red-500 bg-gray-800 hover:bg-gray-700' : 'text-gray-500 hover:text-red-600 bg-white hover:bg-gray-100'}`}><X size={20}/></button>
                          </div>

                          <div className="flex-1 overflow-y-auto space-y-4 pr-2 mb-4 scroll-smooth">
                            {task.comments?.map((c, i) => {
                              const cid = c.id || `old-${i}`; 
                              const isOwner = c.author === loggedInName || (role === 'teacher' && (c.author === TEACHER_NAME || c.author === 'Profesora' || c.author === 'La profe'));
                              const isEditing = editingCommentId === cid;
                              
                              if (c.isDeleted) {
                                  if (role === 'teacher' || isOwner) {
                                      return (
                                          <div key={cid} className={`p-3 rounded-xl text-xs italic border flex flex-col gap-2 ${isDarkMode ? 'bg-gray-800/50 border-gray-700 text-gray-500' : 'bg-gray-200/50 border-gray-300 text-gray-500'}`}>
                                              <div className="flex justify-between items-center">
                                                  <span>{c.author} borró el comentario.</span>
                                                  {role === 'teacher' && (
                                                      <div className="flex gap-2 items-center">
                                                          <button onClick={() => setRevealedComments(prev => ({...prev, [cid]: !prev[cid]}))} className={`font-bold px-2 py-1 rounded shadow-sm transition-all ${isDarkMode ? 'bg-gray-700 text-blue-400 hover:text-blue-300' : 'bg-white text-blue-600 hover:text-blue-800'}`}>
                                                              {revealedComments[cid] ? "Ocultar" : "Revelar"}
                                                          </button>
                                                          <button onClick={() => confirmAction("¿Desea borrar este registro definitivamente de la base de datos?", () => handleDeleteComment(cid, c.author))} className={`font-bold p-1.5 rounded shadow-sm transition-all ${isDarkMode ? 'bg-gray-700 text-red-400 hover:text-red-300' : 'bg-white text-red-600 hover:text-red-800'}`} title="Borrar registro permanentemente">
                                                              <Trash2 size={14} />
                                                          </button>
                                                      </div>
                                                  )}
                                              </div>
                                              {role === 'teacher' && revealedComments[cid] && (
                                                  <p className={`p-2 rounded line-through not-italic mt-1 ${isDarkMode ? 'bg-gray-800 text-gray-400' : 'bg-white text-gray-700'}`}>{c.text}</p>
                                              )}
                                          </div>
                                      );
                                  }
                                  return null; 
                              }

                              return (
                                  <div key={cid} className={`p-4 rounded-2xl text-sm border shadow-sm group/comment transition-all ${isDarkMode ? 'bg-gray-800 border-gray-700 hover:bg-gray-700/80' : 'bg-white border-gray-200 hover:bg-gray-50'}`}>
                                      <div className="flex justify-between items-start">
                                          <div className="flex items-center gap-2">
                                              <span className={`font-bold text-base ${c.author === TEACHER_NAME || c.author === 'Profesora' || c.author === 'La profe' ? 'text-[#AD3333]' : (isDarkMode ? 'text-gray-200' : 'text-gray-800')}`}>{c.author}</span>
                                              {c.isEdited && !isEditing && (
                                                  <div className="relative inline-block">
                                                      <button onClick={() => setHistoryOpenCid(historyOpenCid === cid ? null : cid)} className="text-[10px] text-gray-400 hover:text-blue-500 italic transition-colors mt-0.5">(Editado)</button>
                                                      {historyOpenCid === cid && (
                                                          <div className={`absolute top-full left-0 mt-1 backdrop-blur-xl border shadow-xl rounded-lg p-2 z-50 w-56 ${isDarkMode ? 'bg-gray-800/95 border-gray-600' : 'bg-white/95 border-gray-200'}`}>
                                                              <p className={`text-xs font-bold mb-2 border-b pb-1 ${isDarkMode ? 'text-gray-300 border-gray-600' : 'text-gray-700 border-gray-300'}`}>Historial de ediciones</p>
                                                              {c.editHistory?.map((h, hi) => (
                                                                  <div key={hi} className={`mb-2 pb-2 border-b last:border-0 last:mb-0 last:pb-0 ${isDarkMode ? 'border-gray-700' : 'border-gray-200'}`}>
                                                                      <p className="text-[9px] text-gray-500 mb-0.5">{new Date(h.date).toLocaleString()}</p>
                                                                      <p className={`text-xs line-through ${isDarkMode ? 'text-gray-400' : 'text-gray-600'}`}>{h.text}</p>
                                                                  </div>
                                                              ))}
                                                          </div>
                                                      )}
                                                  </div>
                                              )}
                                          </div>
                                          
                                          <div className="hidden group-hover/comment:flex items-center gap-2">
                                              {isOwner && !isEditing && (
                                                  <button onClick={() => {setEditingCommentId(cid); setEditCommentText(c.text);}} className={`p-1.5 rounded-lg transition-colors ${isDarkMode ? 'text-gray-400 hover:text-blue-400 bg-gray-700' : 'text-gray-400 hover:text-blue-600 bg-gray-100'}`}><Edit3 size={16}/></button>
                                              )}
                                              {(role === 'teacher' || isOwner) && !isEditing && (
                                                  <button onClick={() => confirmAction("¿Seguro que desea borrar este comentario?", () => handleDeleteComment(cid, c.author))} className={`p-1.5 rounded-lg transition-colors ${isDarkMode ? 'text-gray-400 hover:text-red-400 bg-gray-700' : 'text-gray-400 hover:text-red-600 bg-gray-100'}`}><Trash2 size={16}/></button>
                                              )}
                                          </div>
                                      </div>

                                      {isEditing ? (
                                          <div className="mt-3 flex gap-2 items-center">
                                              <input className={`py-2 px-3 text-sm flex-1 rounded-xl outline-none focus:ring-2 transition-all ${isDarkMode ? 'bg-gray-900 border border-gray-700 text-gray-100 focus:ring-blue-500/50' : 'bg-gray-100 border border-gray-300 text-gray-900 focus:ring-blue-400/50'}`} value={editCommentText} onChange={e => setEditCommentText(e.target.value)} />
                                              <button onClick={saveEditedComment} className={`p-2 rounded-xl shadow-sm ${isDarkMode ? 'text-green-400 bg-gray-700 hover:bg-gray-600' : 'text-green-700 bg-gray-100 hover:bg-gray-200'}`}><CheckCheck size={18}/></button>
                                              <button onClick={() => setEditingCommentId(null)} className={`p-2 rounded-xl shadow-sm ${isDarkMode ? 'text-red-400 bg-gray-700 hover:bg-gray-600' : 'text-red-600 bg-gray-100 hover:bg-gray-200'}`}><X size={18}/></button>
                                          </div>
                                      ) : (
                                          <div className="flex flex-col gap-3 mt-2">
                                              {c.text && <p className={`text-base leading-relaxed ${isDarkMode ? 'text-gray-300' : 'text-gray-800'}`}>{c.text}</p>}
                                              {c.imageUrl && (
                                                  <img 
                                                      src={c.imageUrl} 
                                                      alt="Adjunto" 
                                                      onClick={() => setFullScreenImage(c.imageUrl)}
                                                      className={`w-20 h-20 rounded-xl border object-cover mt-1 shadow-sm cursor-pointer hover:opacity-80 transition-opacity bg-black/5 ${isDarkMode ? 'border-gray-700' : 'border-gray-300'}`} 
                                                      onError={(e) => e.target.style.display = 'none'} 
                                                  />
                                              )}
                                          </div>
                                      )}

                                      <div className="mt-4 flex gap-1.5 items-center flex-wrap">
                                          {Object.entries(c.reactions || {}).reduce((acc, [uid, rData]) => {
                                              const emoji = typeof rData === 'object' ? rData.emoji : rData;
                                              let name = typeof rData === 'object' ? rData.name : 'Un usuario';
                                              if (name === 'Profesora' || name === 'La profe') name = TEACHER_NAME;
                                              
                                              const existing = acc.find(item => item.emoji === emoji);
                                              if (existing) { existing.count++; existing.names.push(name); } 
                                              else { acc.push({ emoji, count: 1, names: [name] }); }
                                              return acc;
                                          }, []).map((r, idx) => (
                                              <span key={idx} title={`${r.names.join(', ')} reaccionó así`} className={`px-2 py-1 rounded-full text-xs font-bold border cursor-help shadow-sm ${isDarkMode ? 'bg-gray-700 border-gray-600 text-gray-300' : 'bg-gray-100 border-gray-200 text-gray-700'}`}>{r.emoji} {r.count}</span>
                                          ))}
                                          
                                          {!isLocked && (
                                              <div className="flex items-center gap-1 ml-1">
                                                  <button onClick={() => setActiveReactionCommentId(activeReactionCommentId === cid ? null : cid)} className={`rounded-full p-1.5 transition-colors shadow-sm ${isDarkMode ? 'text-gray-400 hover:text-gray-200 bg-gray-700 hover:bg-gray-600' : 'text-gray-500 hover:text-gray-800 bg-gray-100 hover:bg-gray-200'}`}><Plus size={14}/></button>
                                                  {activeReactionCommentId === cid && (
                                                      <div className={`flex gap-1.5 rounded-full px-3 py-1 border shadow-md animate-in fade-in slide-in-from-left-2 ${isDarkMode ? 'bg-gray-800 border-gray-600' : 'bg-white border-gray-300'}`}>
                                                          {['❤️','👍','😂','😲'].map(emj => (
                                                              <button key={emj} onClick={() => { toggleCommentReaction(cid, emj); setActiveReactionCommentId(null); }} className="hover:scale-125 transition-transform text-base">{emj}</button>
                                                          ))}
                                                      </div>
                                                  )}
                                              </div>
                                          )}
                                      </div>
                                  </div>
                              );
                            })}
                            {(!task.comments || task.comments.length === 0) && <p className="text-sm text-gray-500 italic text-center mt-10">Sé el primero en iniciar la conversación.</p>}
                          </div>
                          
                          {!isLocked ? (
                            <form onSubmit={handleAddComment} className={`pt-4 border-t flex flex-col gap-3 shrink-0 relative ${isDarkMode ? 'border-gray-700' : 'border-gray-300'}`}>
                              <div className={`flex gap-2 items-center rounded-2xl px-3 py-2 transition-all shadow-inner border focus-within:ring-2 ${isDarkMode ? 'bg-gray-800 border-gray-700 focus-within:ring-blue-500/50' : 'bg-white border-gray-300 focus-within:ring-blue-400/50'}`}>
                                
                                <div className="relative">
                                    <button type="button" onClick={() => setShowEmojiPicker(!showEmojiPicker)} className={`p-2 transition rounded-xl shadow-sm ${showEmojiPicker ? (isDarkMode ? 'text-blue-400 bg-gray-700' : 'text-blue-600 bg-gray-200') : (isDarkMode ? 'bg-gray-700 text-gray-400 hover:text-blue-400' : 'bg-gray-100 text-gray-500 hover:text-blue-600')}`}>

// --- SISTEMA DE ACTUALIZACIÓN AUTOMÁTICA SILENCIOSA ---
          useEffect(() => {
              let idleMinutes = 0;
              
              const resetIdleTime = () => { idleMinutes = 0; };
              const events = ['mousemove', 'keydown', 'scroll', 'click', 'touchstart'];
              events.forEach(e => window.addEventListener(e, resetIdleTime));

              const checkUpdateInterval = setInterval(() => {
                  idleMinutes += 1;
                  
                  // Si lleva 30 minutos inactivo Y es seguro recargar (campos vacíos, sin exámenes)
                  if (idleMinutes >= 30) {
                      const isSafeToReload = !taskTitle && !taskDesc && !activeTakingEval && !isCreatingEval && !chatAppInput && !chatInput && !sugText && !reviewTopic && !isCreatingGroup;
                      if (isSafeToReload) {
                          window.location.reload(true); // El 'true' fuerza limpiar la caché del navegador
                      }
                  }
              }, 60000); // Revisa cada 1 minuto

              // También comprobar cuando el usuario regresa a la pestaña tras minimizarla
              let lastVisibleTime = Date.now();
              const handleVisibility = () => {
                  if (document.visibilityState === 'visible') {
                      const hoursAway = (Date.now() - lastVisibleTime) / (1000 * 60 * 60);
                      const isSafeToReload = !taskTitle && !taskDesc && !activeTakingEval && !isCreatingEval && !chatAppInput && !chatInput && !sugText && !reviewTopic && !isCreatingGroup;
                      
                      // Si estuvo fuera de la pestaña más de 1 hora y no hay riesgo de perder datos
                      if (hoursAway >= 1 && isSafeToReload) {
                          window.location.reload(true);
                      }
                      lastVisibleTime = Date.now();
                  }
              };
              document.addEventListener('visibilitychange', handleVisibility);

              return () => {
                  clearInterval(checkUpdateInterval);
                  events.forEach(e => window.removeEventListener(e, resetIdleTime));
                  document.removeEventListener('visibilitychange', handleVisibility);
              };

                          correct++;
                      }
                  } else {

                  }
              });
              return (correct / evalData.questions.length) * 5.0;

                                          const newList = botInfoList.filter(i => i.id !== item.id);

                                  }} className="text-gray-400 hover:text-red-600 shrink-0 transition-colors" title="Eliminar regla"><Trash2 size={16}/></button>
                              </div>
                          ))}
                      </div>
                      <div className="flex gap-2">
                          <textarea 
                              value={botTrainingInfo} onChange={e => setBotTrainingInfo(e.target.value)}

                              className={`${glassInput} h-12 py-3 resize-none text-sm flex-1`}
                          />

                              if(!botTrainingInfo.trim()) return;
                              const newItem = { id: Date.now().toString(), text: botTrainingInfo.trim() };
                              const newList = [...botInfoList, newItem];
                              setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'bot'), { infoList: newList });
                              setBotTrainingInfo("");
                              showMessage("✅ Entrenamiento añadido con éxito.");
                          }} className={`${redButton} h-12 px-6 whitespace-nowrap`}><Plus size={16}/> Añadir Info</button>
                      </div>
                  </div>
              )}

              <div className="w-full space-y-6">
                  {role === 'teacher' && (
                    <form onSubmit={(e) => {
                      e.preventDefault();
                      addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'syllabus'), { week: Number(e.target.week.value), topic: e.target.topic.value, material: e.target.material.value });

                    }} className={`${glassCard} flex flex-wrap gap-4 items-end`}>
                      <input type="number" name="week" placeholder="Semana" className={`${glassInput} w-24`} required />
                      <input name="topic" placeholder="Tema..." className={`${glassInput} flex-1`} required />
                      <button type="submit" className={redButton}>Añadir</button>
                    </form>
                  )}
                  <div className={`${glassCard} overflow-x-auto p-0`}>
                    <table className="w-full text-left">
                      <thead className="bg-white/40 border-b border-white/50">
                        <tr><th className="p-4 font-bold">Semana</th><th className="p-4 font-bold">Tema</th><th className="p-4 font-bold">Material</th>{role === 'teacher' && <th></th>}</tr>
                      </thead>
                      <tbody>
                        {syllabus.length === 0 ? <tr><td colSpan="4" className="p-4 text-gray-600 text-center font-medium">No hay contenidos en el calendario.</td></tr> : syllabus.map(item => (
                          <tr key={item.id} className="border-b border-white/20">

                            <td className="p-4 text-sm">{item.topic}</td>
                            <td className="p-4">{item.material ? <a href={item.material} target="_blank" className="text-blue-600 underline text-xs font-bold">Ver PDF</a> : '-'}</td>
                            {role === 'teacher' && <td className="p-4"><button onClick={() => confirmAction("¿Desea borrar este tema del syllabus?", () => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'syllabus', item.id)))}><Trash2 size={14}/></button></td>}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
              </div>
            </div>
          );

          const renderDirectory = () => (
             <div className="space-y-6 max-w-2xl mx-auto pb-20 md:pb-0">
               <h2 className="text-3xl font-bold text-gray-800 mb-6 flex items-center gap-2 drop-shadow-sm"><UsersIcon className="text-[#AD3333]" /> Directorio de Estudiantes</h2>
               
               <form onSubmit={async (e) => {
                   e.preventDefault();
                   const u = e.target.username.value.trim().toLowerCase().replace('@', '');
                   const fn = e.target.fullname.value.trim();
                   const email = e.target.email.value.trim();
                   const pass = e.target.password.value;
                   
                   if (!u || !fn || !email || !pass) return;
                   
                   try {
                       await createUserWithEmailAndPassword(secondaryAuth, email, pass);
                       await signOut(secondaryAuth);
                       
                       await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userMappings', u), { 
                           fullName: fn, email: email, role: 'student', createdAt: Date.now() 
                       });
                       e.target.reset();
                       showMessage("✅ Estudiante creado e ingresado al directorio.");
                   } catch(err) {
                       showMessage("❌ Error: " + (err.message.includes('email-already') ? 'El correo ya existe' : err.message));
                   }
               }} className={`${glassCard} flex flex-col gap-4 mb-6`}>
                   <p className="text-sm font-bold text-gray-700">Crea un nuevo estudiante. La contraseña se encriptará en Google y nadie podrá verla en el código.</p>
                   <input name="fullname" placeholder="Nombre Real Completo" className={glassInput} required />
                   <input name="username" placeholder="Nombre de Usuario (Ej: camilopruebas)" className={glassInput} required />
                   <input name="email" type="email" placeholder="Correo electrónico del estudiante" className={glassInput} required />
                   <input name="password" type="text" placeholder="Contraseña Inicial" className={glassInput} required />
                   
                   <button type="submit" className={redButton}><Plus size={18}/> Crear Estudiante</button>
               </form>

               <div className={glassCard}>
                   <h3 className="font-bold text-gray-800 mb-4">Directorio Oculto</h3>
                   <div className="space-y-2 max-h-60 overflow-y-auto pr-2">
                       {Object.keys(userMappings).length === 0 && <p className="text-sm text-gray-500 italic">No hay estudiantes extra.</p>}
                       {Object.entries(userMappings).map(([userKey, data]) => (
                           <div key={userKey} className="bg-white/50 p-3 rounded-xl flex justify-between items-center border border-white/60 shadow-sm">
                               <div>
                                   <p className="font-bold text-sm text-gray-800">{data.fullName}</p>
                                   <p className="text-xs text-gray-600">Usuario: @{userKey}</p>
                                   <p className="text-xs text-gray-500">Correo: {data.email}</p>
                               </div>
                               <button onClick={() => confirmAction("¿Desea eliminar a este estudiante del directorio?", () => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userMappings', userKey)))} className="text-gray-400 hover:text-red-600 transition-colors"><Trash2 size={16}/></button>
                           </div>
                       ))}
                   </div>
               </div>
             </div>
          );

          const renderEvaluations = () => {
              if (activeTakingEval) {
                  return (
                      <div className="max-w-4xl mx-auto space-y-6 pb-20 md:pb-0">
                          <div className={`${glassCard} flex flex-col md:flex-row justify-between items-start md:items-center gap-4 sticky top-[80px] z-40`}>
                              <div>
                                  <h2 className={`text-2xl font-extrabold ${isDarkMode ? 'text-gray-100' : 'text-gray-800'}`}>{activeTakingEval.title}</h2>
                                  <p className={`text-sm ${isDarkMode ? 'text-gray-400' : 'text-gray-600'}`}>{activeTakingEval.description}</p>
                              </div>
                              <div className="bg-red-100/90 backdrop-blur-md text-red-700 px-6 py-3 rounded-2xl font-black font-mono text-2xl flex items-center gap-3 shadow-lg border border-red-200 shrink-0">
                                  <Clock size={24}/> {formatTime(timeRemaining)}
                              </div>
                          </div>

                          <div className="space-y-6">
                              {activeTakingEval.questions.map((q, qIndex) => (
                                  <div key={qIndex} className={`${glassCard} transition-all`}>
                                      <h3 className={`text-lg font-bold mb-4 flex gap-2 ${isDarkMode ? 'text-gray-200' : 'text-gray-800'}`}>
                                          <span className="text-blue-500">{qIndex + 1}.</span> {q.text}
                                      </h3>
                                      
                                      {q.type === 'multiple' ? (
                                          <div className="space-y-3">
                                              {q.options.map((opt, oIndex) => {
                                                  const isSelected = (studentAnswers[qIndex] || []).includes(oIndex);
                                                  return (
                                                      <label key={oIndex} className={`flex items-center gap-3 p-4 rounded-xl cursor-pointer border transition-all ${isSelected ? 'bg-blue-500/10 border-blue-400 shadow-sm' : (isDarkMode ? 'bg-white/5 border-white/10 hover:bg-white/10' : 'bg-white/40 border-white/60 hover:bg-white/60')}`}>
                                                          <input 
                                                              type="checkbox" 
                                                              checked={isSelected}
                                                              onChange={(e) => {
                                                                  const currentAns = studentAnswers[qIndex] || [];
                                                                  if (e.target.checked) {
                                                                      setStudentAnswers({...studentAnswers, [qIndex]: [...currentAns, oIndex]});
                                                                  } else {
                                                                      setStudentAnswers({...studentAnswers, [qIndex]: currentAns.filter(idx => idx !== oIndex)});
                                                                  }
                                                              }} 
                                                              className="w-5 h-5 accent-blue-600 rounded" 
                                                          />
                                                          <span className={`font-medium ${isDarkMode ? 'text-gray-200' : 'text-gray-700'}`}>{opt.text}</span>
                                                      </label>
                                                  );
                                              })}
                                          </div>
                                      ) : (
                                          <input 
                                              type="text" 
                                              value={studentAnswers[qIndex] || ""} 
                                              onChange={(e) => setStudentAnswers({...studentAnswers, [qIndex]: e.target.value})}
                                              placeholder="Escribe tu respuesta aquí..." 
                                              className={`${glassInput} text-lg`} 
                                          />
                                      )}
                                  </div>
                              ))}
                          </div>
                          
                          <div className="flex justify-end pt-4 pb-8">
                              <button onClick={() => confirmAction("¿Estás seguro de enviar la evaluación? No podrás modificarla después.", () => submitEvaluation(false))} className={`${redButton} px-10 py-4 text-lg w-full md:w-auto`}><Send size={20}/> Terminar y Enviar</button>
                          </div>
                      </div>
                  );
              }

                  const evalGrades = grades.filter(g => g.evaluationId === viewingResultsFor.id);
                  return (
                      <div className="space-y-6 max-w-4xl mx-auto pb-20 md:pb-0">
                          <div className="flex items-center justify-between mb-6">
                              <h2 className={`text-3xl font-bold flex items-center gap-2 drop-shadow-sm ${isDarkMode ? 'text-gray-100' : 'text-gray-800'}`}>
                                  <button onClick={() => setViewingResultsFor(null)} className="mr-2 p-2 hover:bg-white/20 rounded-full transition-colors"><ArrowLeftIcon size={24}/></button>
                                  Resultados

                              <span className="bg-white/40 px-4 py-2 rounded-xl font-bold text-sm border border-white/50">{viewingResultsFor.title}</span>
                          </div>

                          <div className={`${glassCard} overflow-x-auto p-0`}>
                              <table className="w-full text-left">
                                  <thead className={`border-b ${isDarkMode ? 'bg-gray-800/50 border-gray-700 text-gray-300' : 'bg-white/40 border-white/50 text-gray-800'}`}>
                                      <tr>
                                          <th className="p-4 font-bold">Estudiante</th>
                                          <th className="p-4 font-bold text-center">Nota (0.0 - 5.0)</th>
                                          <th className="p-4 font-bold">Fecha de Entrega</th>
                                          <th className="p-4 font-bold text-center">Acciones</th>
                                      </tr>
                                  </thead>
                                  <tbody>
                                      {evalGrades.length === 0 ? <tr><td colSpan="4" className="p-8 text-gray-500 text-center font-medium italic">Ningún estudiante ha presentado esta prueba aún.</td></tr> : evalGrades.map(grade => (
                                          <tr key={grade.id} className={`border-b last:border-0 ${isDarkMode ? 'border-gray-700/50' : 'border-white/20'}`}>
                                              <td className="p-4 font-bold text-blue-500">{grade.studentName}</td>
                                              <td className="p-4 text-center">
                                                  {editingGrade.id === grade.id ? (
                                                      <div className="flex justify-center items-center gap-2">
                                                          <input type="number" step="0.1" min="0" max="5" value={editingGrade.score} onChange={(e) => setEditingGrade({...editingGrade, score: e.target.value})} className={`${glassInput} w-20 py-1 text-center font-bold`} autoFocus />

                                                          <button onClick={() => setEditingGrade({id: null, score: ''})} className="text-red-500 hover:text-red-700"><X size={20}/></button>
                                                      </div>
                                                  ) : (
                                                      <span className={`font-black text-lg ${grade.score >= 3.0 ? 'text-green-600' : 'text-red-600'}`}>{grade.score.toFixed(1)}</span>
                                                  )}
                                              </td>
                                              <td className="p-4 text-sm text-gray-500">{new Date(grade.submittedAt).toLocaleString()}</td>
                                              <td className="p-4 text-center">
                                                  {!editingGrade.id && <button onClick={() => setEditingGrade({id: grade.id, score: grade.score})} className="text-gray-500 hover:text-blue-600 transition-colors" title="Modificar Nota"><Edit3 size={18}/></button>}
                                              </td>
                                          </tr>
                                      ))}
                                  </tbody>
                              </table>
                          </div>
                      </div>
                  );
              }

              if (isCreatingEval) {

                              <button onClick={() => setIsCreatingEval(false)} className={`p-2 hover:bg-white/20 rounded-full transition-colors ${isDarkMode ? 'text-white' : 'text-gray-800'}`}><ArrowLeftIcon size={24}/></button>
                              <h2 className={`text-3xl font-bold drop-shadow-sm ${isDarkMode ? 'text-gray-100' : 'text-gray-800'}`}>Crear Nueva Evaluación</h2>

                          <form onSubmit={handleSaveEval} className="space-y-6">

                                  <div><label className="text-xs font-bold text-gray-500 ml-1">Título de la Evaluación</label><input value={evalFormData.title} onChange={e => setEvalFormData({...evalFormData, title: e.target.value})} placeholder="Ej: Quiz de Verbos Irregulares..." className={glassInput} required /></div>
                                  <div><label className="text-xs font-bold text-gray-500 ml-1">Descripción / Instrucciones</label><textarea value={evalFormData.description} onChange={e => setEvalFormData({...evalFormData, description: e.target.value})} placeholder="Instrucciones para los estudiantes..." className={`${glassInput} h-24 resize-none`} required /></div>
                                  
                                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                      <div><label className="text-xs font-bold text-gray-500 ml-1">Fecha Límite</label><input type="date" value={evalFormData.dueDate} onChange={e => setEvalFormData({...evalFormData, dueDate: e.target.value})} className={glassInput} required /></div>
                                      <div><label className="text-xs font-bold text-gray-500 ml-1">Hora Límite</label><input type="time" value={evalFormData.dueTime} onChange={e => setEvalFormData({...evalFormData, dueTime: e.target.value})} className={glassInput} required /></div>
                                      <div><label className="text-xs font-bold text-gray-500 ml-1">Tiempo (minutos)</label><input type="number" min="1" max="180" value={evalFormData.timeLimit} onChange={e => setEvalFormData({...evalFormData, timeLimit: parseInt(e.target.value)})} className={glassInput} required /></div>
                                  </div>
                              </div>

                              <div className="space-y-4">
                                  <div className="flex justify-between items-center px-2">
                                      <h3 className={`font-bold text-xl ${isDarkMode ? 'text-gray-200' : 'text-gray-700'}`}>Preguntas ({evalFormData.questions.length}/20)</h3>
                                  </div>

                                  {evalFormData.questions.map((q, qIndex) => (
                                      <div key={qIndex} className={`${glassCard} !p-5 relative animate-in fade-in slide-in-from-bottom-2`}>
                                          <div className="absolute top-4 right-4">
                                              <button type="button" onClick={() => {
                                                  const newQ = [...evalFormData.questions]; newQ.splice(qIndex, 1);
                                                  setEvalFormData({...evalFormData, questions: newQ});
                                              }} className="text-gray-400 hover:text-red-500 transition-colors" title="Eliminar pregunta"><Trash2 size={18}/></button>
                                          </div>
                                          
                                          <div className="flex items-center gap-3 mb-4 pr-8">
                                              <span className="w-8 h-8 rounded-full bg-blue-500 text-white font-bold flex items-center justify-center shrink-0">{qIndex + 1}</span>
                                              <select value={q.type} onChange={(e) => {
                                                  const newQ = [...evalFormData.questions]; newQ[qIndex].type = e.target.value; setEvalFormData({...evalFormData, questions: newQ});
                                              }} className={`${glassInput} !py-2 w-auto font-bold text-blue-600 cursor-pointer`}>
                                                  <option value="multiple">Selección Múltiple</option>
                                                  <option value="text">Escribir Respuesta</option>
                                              </select>
                                          </div>
                                          
                                          <input value={q.text} onChange={(e) => {
                                              const newQ = [...evalFormData.questions]; newQ[qIndex].text = e.target.value; setEvalFormData({...evalFormData, questions: newQ});
                                          }} placeholder="Escribe la pregunta..." className={`${glassInput} mb-4 font-medium text-lg`} required />

                                          {q.type === 'multiple' ? (
                                              <div className={`space-y-2 pl-4 md:pl-11 border-l-2 ${isDarkMode ? 'border-gray-600' : 'border-gray-300'}`}>

                                                  {q.options.map((opt, oIndex) => (
                                                      <div key={oIndex} className="flex gap-3 items-center group">
                                                          <input type="checkbox" checked={opt.isCorrect} onChange={(e) => {
                                                              const newQ = [...evalFormData.questions]; newQ[qIndex].options[oIndex].isCorrect = e.target.checked; setEvalFormData({...evalFormData, questions: newQ});
                                                          }} className="w-5 h-5 accent-green-500 cursor-pointer" title="Marcar como correcta" />
                                                          <input value={opt.text} onChange={(e) => {
                                                              const newQ = [...evalFormData.questions]; newQ[qIndex].options[oIndex].text = e.target.value; setEvalFormData({...evalFormData, questions: newQ});
                                                          }} placeholder={`Opción ${oIndex + 1}`} className={`${glassInput} !py-2 flex-1 ${opt.isCorrect ? 'border-green-400 bg-green-500/10' : ''}`} required />
                                                          <button type="button" onClick={() => {
                                                              if(q.options.length <= 2) return showMessage("Mínimo 2 opciones.");
                                                              const newQ = [...evalFormData.questions]; newQ[qIndex].options.splice(oIndex, 1); setEvalFormData({...evalFormData, questions: newQ});
                                                          }} className="text-gray-400 hover:text-red-500 transition-colors p-2" title="Eliminar opción"><X size={16}/></button>
                                                      </div>
                                                  ))}
                                                  {q.options.length < 4 && (
                                                      <button type="button" onClick={() => {
                                                          const newQ = [...evalFormData.questions]; newQ[qIndex].options.push({text: '', isCorrect: false}); setEvalFormData({...evalFormData, questions: newQ});
                                                      }} className="text-sm font-bold text-blue-500 hover:text-blue-600 mt-2 flex items-center gap-1"><Plus size={14}/> Añadir otra opción</button>
                                                  )}
                                              </div>
                                          ) : (
                                              <div className={`pl-4 md:pl-11 border-l-2 ${isDarkMode ? 'border-gray-600' : 'border-gray-300'}`}>
                                                  <p className="text-xs font-bold text-gray-500 mb-2">Escribe la respuesta exacta esperada (no distingue mayúsculas/minúsculas).</p>
                                                  <input value={q.correctAnswer} onChange={(e) => {
                                                      const newQ = [...evalFormData.questions]; newQ[qIndex].correctAnswer = e.target.value; setEvalFormData({...evalFormData, questions: newQ});
                                                  }} placeholder="Ej: went" className={`${glassInput} border-green-400 bg-green-500/10`} required />
                                              </div>
                                          )}
                                      </div>
                                  ))}

                                  {evalFormData.questions.length < 20 && (
                                      <button type="button" onClick={() => {
                                          setEvalFormData({...evalFormData, questions: [...evalFormData.questions, { type: 'multiple', text: '', options: [{text: '', isCorrect: false}, {text: '', isCorrect: false}], correctAnswer: '' }]});
                                      }} className={`w-full py-4 border-2 border-dashed rounded-2xl font-bold flex items-center justify-center gap-2 transition-colors ${isDarkMode ? 'border-gray-600 text-gray-400 hover:border-blue-500 hover:text-blue-500' : 'border-gray-400 text-gray-600 hover:border-blue-600 hover:text-blue-600'}`}>
                                          <Plus size={20} /> Añadir Pregunta
                                      </button>
                                  )}
                              </div>

                              <div className="flex justify-end pt-6 border-t border-white/20">
                                  <button type="submit" className={`${redButton} px-10 py-4 text-lg w-full md:w-auto shadow-xl`}><CheckCircle2 size={20}/> Guardar Evaluación</button>
                              </div>
                          </form>
                      </div>
                  );
              }

              // Vista de Lista (Por defecto)
              return (
                <div className="space-y-6 max-w-5xl mx-auto pb-20 md:pb-0">
                  <div className="flex justify-between items-center mb-6">
                      <h2 className="text-3xl font-bold text-gray-800 flex items-center gap-2 drop-shadow-sm"><FileText className="text-[#AD3333]" /> Evaluaciones</h2>
                      {role === 'teacher' && (
                          <button onClick={() => setIsCreatingEval(true)} className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-md font-bold px-4 py-2.5 rounded-full hover:scale-105 transition flex items-center gap-2 text-sm"><Plus size={16}/> Crear</button>
                      )}
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {evaluations.length === 0 ? <p className="text-gray-600 italic px-4 col-span-full">No hay evaluaciones programadas.</p> : null}
                      
                      {evaluations.map(ev => {
                          const deadline = new Date(`${ev.dueDate}T${ev.dueTime || '23:59'}`);
                          const isExpired = new Date() > deadline;
                          const studentGrade = role === 'student' ? grades.find(g => g.evaluationId === ev.id && g.studentId === user.uid) : null;
                          const isDone = !!studentGrade;

                          return (
                              <div key={ev.id} className={`${glassCard} flex flex-col hover:bg-white/30 transition-colors group relative overflow-hidden`}>
                                  {isExpired && <div className="absolute top-4 right-[-30px] bg-red-600 text-white text-[10px] font-black px-10 py-1 rotate-45 shadow-md">CERRADO</div>}
                                  {isDone && <div className="absolute top-4 right-[-30px] bg-green-600 text-white text-[10px] font-black px-10 py-1 rotate-45 shadow-md">ENVIADO</div>}
                                  
                                  <h3 className="text-xl font-bold text-gray-900 mb-2 pr-10">{ev.title}</h3>
                                  <p className="text-sm text-gray-700 mb-4 line-clamp-2">{ev.description}</p>
                                  
                                  <div className="mt-auto space-y-2 bg-white/40 p-3 rounded-xl border border-white/50">
                                      <p className={`text-xs font-bold flex items-center gap-1 ${isExpired ? 'text-red-600' : 'text-[#AD3333]'}`}><CalendarEmoji size={14}/> Cierre: {ev.dueDate} a las {ev.dueTime}</p>
                                      <p className="text-xs font-bold flex items-center gap-1 text-gray-600"><Clock size={14}/> Tiempo: {ev.timeLimit} minutos</p>
                                      <p className="text-xs font-bold flex items-center gap-1 text-blue-600"><CheckCheck size={14}/> Preguntas: {ev.questions?.length || 0}</p>
                                  </div>

                                  <div className="mt-4 pt-4 border-t border-white/30 flex justify-between items-center">
                                      {role === 'teacher' ? (

                                                          setDoc(typingRef, { [myChatId]: true }, { merge: true });
                                                          clearTimeout(typingTimeout.current);
                                                          typingTimeout.current = setTimeout(() => {
                                                              setDoc(typingRef, { [myChatId]: false }, { merge: true });
                                                          }, 2000);
                                                      }} 
                                                      placeholder="Escribe un mensaje..." 
                                                      className={`flex-1 bg-transparent border-none outline-none py-3 px-2 text-base md:text-lg font-medium ${isDarkMode ? 'text-gray-100 placeholder-gray-500' : 'text-gray-900 placeholder-gray-500'}`} 
                                                  />
                                                  
                                                  <button type="submit" className="p-3 bg-blue-600 text-white hover:bg-blue-700 shadow-md rounded-xl transition-all flex items-center justify-center">
                                                      <Send size={24} />
                                                  </button>
                                              </div>

                                              {(showChatAppImageInput || chatAppImageUrl) && (
                                                  <div className="px-1 animate-in fade-in slide-in-from-top-2 relative">
                                                      {showChatAppImageInput && (
                                                          <input 
                                                              value={chatAppImageUrl} onChange={e => setChatAppImageUrl(e.target.value)} 
                                                              placeholder="Enlace DIRECTO de imagen..." 
                                                              className={`w-full rounded-xl px-4 py-3 outline-none focus:ring-2 transition-all text-sm font-medium border shadow-inner ${isDarkMode ? 'bg-gray-900 border-gray-700 text-gray-100 focus:ring-blue-500/50' : 'bg-gray-50 border-gray-300 text-gray-900 focus:ring-blue-400/50'}`} 
                                                          />
                                                      )}
                                                      
                                                      {chatAppImageUrl && (
                                                          <div className="relative w-fit mt-3">
                                                              <img src={chatAppImageUrl} alt="Preview" className={`h-24 w-24 object-cover rounded-xl border shadow-sm ${isDarkMode ? 'border-gray-700' : 'border-gray-300'}`} onError={(e) => e.target.style.display = 'none'} />
                                                              <button type="button" onClick={() => setChatAppImageUrl("")} className="absolute -top-2 -right-2 bg-red-600 text-white rounded-full p-1 hover:bg-red-700 transition shadow-md"><X size={14}/></button>
                                                          </div>
                                                      )}
                                                  </div>
                                              )}
                                          </form>
                                      </div>
                                  </div>
                              );
                          })()}
                      </div>
                  </div>
              , document.body)}

              {showSugModal && (
                  <div className="fixed inset-0 z-[150] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
                      <div className={`${glassCard} max-w-md w-full flex flex-col gap-4 relative animate-in fade-in zoom-in duration-200`}>
                          <button onClick={() => setShowSugModal(false)} className="absolute top-4 right-4 text-gray-500 hover:text-gray-800 transition-colors"><X size={20}/></button>
                          <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2"><Mail className="text-[#AD3333]"/> Buzón de sugerencias</h3>
                          <p className="text-sm text-gray-600">Deja tu sugerencia o retroalimentación de las clases de lo que te gustaría ver más (o menos) en clase!</p>
                          <form onSubmit={handleSubmitSuggestion} className="flex flex-col gap-3">
                              <textarea value={sugText} onChange={e => setSugText(e.target.value)} placeholder="Escribe tu sugerencia aquí..." className={`${glassInput} h-32 resize-none`} required />
                              <button type="submit" disabled={isSugLoading} className={redButton}>{isSugLoading ? <Loader2 className="animate-spin" size={20}/> : 'Enviar'}</button>
                          </form>
                      </div>
                  </div>
              )}

              {toastMessage && (
                <div className="fixed bottom-24 md:bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900/95 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-2xl z-[200] font-medium text-sm text-center border border-gray-700 whitespace-nowrap">
                  {toastMessage}
                </div>
              )}

              {/* MODAL IMAGEN PANTALLA COMPLETA (APP) */}
              {fullScreenImage && ReactDOM.createPortal(
                  <div className="fixed inset-0 z-[100000] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 animate-in fade-in duration-200" onClick={() => setFullScreenImage(null)}>
                      <button className="absolute top-4 md:top-8 right-4 md:right-8 text-white/70 hover:text-white bg-black/50 hover:bg-red-600 p-2 rounded-full transition-all shadow-lg"><X size={28}/></button>
                      <img src={fullScreenImage} className="max-w-full max-h-full object-contain rounded-lg shadow-2xl" onClick={e => e.stopPropagation()} />
                  </div>
              , document.body)}

              {/* MODAL GLOBAL DE CONFIRMACIÓN */}
              {confirmDialog.isOpen && ReactDOM.createPortal(
                  <div className="fixed inset-0 z-[99999] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                      <div className={`max-w-sm w-full flex flex-col gap-4 p-6 rounded-3xl animate-in fade-in zoom-in duration-200 shadow-2xl ${isDarkMode ? 'bg-gray-900 border border-gray-700' : 'bg-white border border-gray-200'}`}>
                          <h3 className={`text-xl font-bold flex items-center gap-2 ${isDarkMode ? 'text-gray-100' : 'text-gray-800'}`}>
                              <AlertTriangle className="text-red-500" /> Confirmar Acción
                          </h3>
                          <p className={`text-sm font-medium ${isDarkMode ? 'text-gray-300' : 'text-gray-600'}`}>{confirmDialog.message}</p>
                          <div className="flex gap-3 mt-4">
                              <button onClick={() => setConfirmDialog({ isOpen: false })} className={`flex-1 py-2.5 rounded-xl font-bold transition-all shadow-sm ${isDarkMode ? 'bg-gray-800 text-gray-300 hover:bg-gray-700 border border-gray-600' : 'bg-gray-100 text-gray-700 hover:bg-gray-200 border border-gray-300'}`}>Cancelar</button>
                              <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog({ isOpen: false }); }} className="flex-1 bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-xl font-bold transition-all shadow-md">Sí, borrar</button>
                          </div>
                      </div>
                  </div>
              , document.body)}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
