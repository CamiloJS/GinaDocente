<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plataforma English TECH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 overscroll-none">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;
        
        // --- IMPORTACIONES ADAPTADAS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Íconos generales de Lucide
        const createIcon = (emoji) => (p) => <span style={{fontSize: p.size||16}} className={p.className}>{emoji}</span>;
        const BookOpen = createIcon('📖'); const CalendarEmoji = createIcon('📅'); const CheckSquare = createIcon('☑️');
        const Plus = createIcon('➕'); const Send = createIcon('🚀'); const FileText = createIcon('📄');
        const Trash2 = createIcon('🗑️'); const X = createIcon('❌'); const Sparkles = createIcon('✨');
        const CheckCheck = createIcon('✅'); const Loader2 = createIcon('⏳'); 
        const Undo2 = createIcon('↩️'); const Clock = createIcon('⏰'); const Lock = createIcon('🔒');
        const Mail = createIcon('📥'); const AlertTriangle = createIcon('⚠️'); 
        const ChevronRight = createIcon('➡️'); const ChevronLeft = createIcon('⬅️'); const Edit3 = createIcon('✏️');
        const Palette = createIcon('🎨'); 
        
        // Íconos SVG para Sol y Luna
        const Sun = (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const Moon = (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;

        // NUEVOS: Íconos SVG profesionales en blanco y negro para la barra inferior de celulares
        const NavNotebook = (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>;
        const NavSlides = (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5-5 5 5"/></svg>;
        const NavCalendar = (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const NavFile = (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;

        // --- CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = {
          apiKey: "AIzaSyB-BDGpMhiNjSfGiGiGHHd6jbu5nQvoOfs",
          authDomain: "ginadocente-unipamplona.firebaseapp.com",
          projectId: "ginadocente-unipamplona",
          storageBucket: "ginadocente-unipamplona.firebasestorage.app",
          messagingSenderId: "628380121872",
          appId: "1:628380121872:web:4766b1e2964b023f838395",
          measurementId: "G-6QKYMFPRHH"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'unipamplona-english-app';

        // --- ESTILOS LIQUID Glass MEJORADOS ---
        const glassCard = "bg-white/20 backdrop-blur-2xl border border-white/40 shadow-[0_8px_32px_0_rgba(173,51,51,0.1)] rounded-3xl p-6 transition-all duration-300";
        const glassInput = "w-full bg-white/30 backdrop-blur-md border border-white/50 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-[#AD3333]/50 focus:border-[#AD3333] transition-all placeholder-gray-600 text-gray-900 shadow-inner";
        const glowButton = "bg-white/40 backdrop-blur-md text-gray-900 px-6 py-3 rounded-full font-semibold border border-white/60 shadow-sm hover:shadow-[0_0_20px_rgba(173,51,51,0.4)] hover:border-[#AD3333] hover:text-[#AD3333] transition-all duration-300 flex items-center justify-center gap-2";
        const redButton = "bg-[#AD3333]/90 backdrop-blur-md text-white px-6 py-3 rounded-full font-semibold shadow-lg shadow-[#AD3333]/30 hover:shadow-[0_0_25px_#AD3333] hover:bg-[#8a2828] transition-all duration-300 flex items-center justify-center gap-2";

        const REACTION_EMOJIS = { like: '👍', love: '❤️', sad: '😢', happy: '😃', wow: '😲' };

        const SLIDE_GRADIENTS = [
          "from-blue-400/40 to-indigo-500/40",
          "from-emerald-400/40 to-teal-500/40",
          "from-rose-400/40 to-orange-500/40",
          "from-purple-400/40 to-pink-500/40",
          "from-amber-400/40 to-red-500/40",
          "from-cyan-400/40 to-blue-500/40",
          "from-fuchsia-400/40 to-rose-500/40"
        ];

        const TaskCard = ({ task, role, db, appId, glassInput, callGemini, currentUser, showMessage }) => {
          const [commentText, setCommentText] = useState("");
          const [isTranslating, setIsTranslating] = useState(false);

          const deadline = new Date(`${task.dueDate}T${task.dueTime || '23:59'}`);
          const isExpired = new Date() > deadline;
          const isLocked = isExpired && !task.allowLate;

          const cardStyle = isExpired 
            ? "bg-red-900/10 backdrop-blur-2xl border border-red-500/40 shadow-[0_8px_32px_0_rgba(220,38,38,0.15)] rounded-3xl p-6 transition-all duration-300"
            : glassCard;

          const handleTranslate = async (lang) => {
            if (!commentText) return;
            setIsTranslating(true);
            const prompt = `Traduce el siguiente comentario al ${lang} de forma profesional y natural. Devuelve ÚNICAMENTE la traducción, sin explicaciones ni comillas:\n\n${commentText}`;
            const result = await callGemini(prompt);
            if (result) {
              setCommentText(result);
            }
            setIsTranslating(false);
          };

          const toggleReaction = async (type) => {
            if (isLocked || !currentUser) return;
            const currentReactions = task.reactions || {};
            const newReactions = { ...currentReactions };
            
            if (newReactions[currentUser.uid] === type) {
              delete newReactions[currentUser.uid];
            } else {
              newReactions[currentUser.uid] = type;
            }
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { ...task, reactions: newReactions });
          };

          const renderReactions = () => {
            const counts = { like: 0, love: 0, sad: 0, happy: 0, wow: 0 };
            Object.values(task.reactions || {}).forEach(r => { if (counts[r] !== undefined) counts[r]++; });

            return (
              <div className="flex gap-2 mt-4">
                {Object.entries(REACTION_EMOJIS).map(([key, emoji]) => {
                  const isSelected = task.reactions?.[currentUser?.uid] === key;
                  return (
                    <button 
                      key={key} onClick={() => toggleReaction(key)} disabled={isLocked}
                      className={`flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-bold transition-all border ${isSelected ? 'bg-white/60 border-[#AD3333] shadow-sm scale-105' : 'bg-white/30 border-white/40 hover:bg-white/50'} ${isLocked ? 'opacity-50 cursor-not-allowed' : ''}`}
                    >
                      {emoji} {counts[key] > 0 && <span className="text-gray-800">{counts[key]}</span>}
                    </button>
                  );
                })}
              </div>
            );
          };

          return (
            <div className={`${cardStyle} group ${!isLocked && 'hover:bg-white/30'}`}>
              <div className="flex justify-between items-start">
                <div>
                  <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                    {task.title} {isLocked && <Lock size={18} className="text-red-600" />}
                  </h3>
                  <p className={`text-sm font-bold mt-1 flex items-center gap-1 ${isExpired ? 'text-red-600' : 'text-[#AD3333]'}`}>
                    <Clock size={14} /> Vence: {task.dueDate} a las {task.dueTime || '23:59'} 
                    {isExpired && (task.allowLate ? " (Se aceptan entregas tardías)" : " (Cerrado)")}
                  </p>
                </div>
                {role === 'teacher' && (
                  <button onClick={() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id))} className="text-gray-400 hover:text-red-600 transition relative z-10">
                    <Trash2 size={20} />
                  </button>
                )}
              </div>
              <p className="mt-4 text-gray-800 whitespace-pre-wrap leading-relaxed">{task.description}</p>
              {renderReactions()}

              <div className="mt-6 pt-6 border-t border-white/30">
                <h4 className="text-sm font-bold text-gray-700 mb-3 drop-shadow-sm">Comentarios</h4>
                <div className="space-y-3 mb-4 max-h-40 overflow-y-auto pr-2 relative z-10">
                  {task.comments?.map((c, i) => (
                    <div key={i} className="bg-white/40 backdrop-blur-md p-3 rounded-xl text-sm border border-white/30">
                      <span className={`font-bold ${c.author === 'English TECH' ? 'text-[#AD3333]' : 'text-gray-800'}`}>{c.author}: </span>
                      <span className="text-gray-800">{c.text}</span>
                    </div>
                  ))}
                  {(!task.comments || task.comments.length === 0) && <p className="text-xs text-gray-500 italic">No hay comentarios.</p>}
                </div>
                
                {!isLocked ? (
                  <form onSubmit={async (e) => {
                    e.preventDefault();
                    if(!commentText.trim()) return;
                    const newComments = [...(task.comments || []), { author: role === 'teacher' ? 'English TECH' : 'Estudiante', text: commentText.trim() }];
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { ...task, comments: newComments });
                    setCommentText("");
                  }} className="flex flex-col gap-2 relative z-10">
                    <div className="flex gap-2">
                      <input value={commentText} onChange={(e) => setCommentText(e.target.value)} placeholder="Escribe un comentario..." className={`${glassInput} py-2`} />
                      <button type="submit" disabled={isTranslating} className="bg-[#AD3333]/90 text-white p-3 rounded-xl hover:shadow-[0_0_20px_#AD3333] transition disabled:opacity-50"><Send size={18} /></button>
                    </div>
                    {role === 'teacher' && (
                      <div className="flex gap-2 justify-start mt-1">
                        <button type="button" onClick={() => handleTranslate('Inglés')} disabled={isTranslating} title="Traducir a Inglés" className="bg-white/50 text-gray-800 border border-white/60 px-3 py-1 rounded-lg text-base shadow-sm hover:bg-white/80 transition-all flex items-center justify-center disabled:opacity-50">🇺🇸</button>
                        <button type="button" onClick={() => handleTranslate('Francés')} disabled={isTranslating} title="Traducir a Francés" className="bg-white/50 text-gray-800 border border-white/60 px-3 py-1 rounded-lg text-base shadow-sm hover:bg-white/80 transition-all flex items-center justify-center disabled:opacity-50">🇫🇷</button>
                        {isTranslating && <Loader2 className="animate-spin text-[#AD3333]" size={14} />}
                      </div>
                    )}
                  </form>
                ) : (
                  <p className="text-sm font-bold text-red-600 bg-red-100/50 p-3 rounded-xl border border-red-200">🔒 La interacción para esta tarea ha sido bloqueada.</p>
                )}
              </div>
            </div>
          );
        };

        function App() {
          const [user, setUser] = useState(null);
          const [role, setRole] = useState('student');
          const [activeTab, setActiveTab] = useState('tasks');
          const [showLogin, setShowLogin] = useState(false);
          const [loginError, setLoginError] = useState("");
          const [isDarkMode, setIsDarkMode] = useState(false);

          const [showSugModal, setShowSugModal] = useState(false);
          const [sugName, setSugName] = useState("");
          const [sugText, setSugText] = useState("");
          const [isSugLoading, setIsSugLoading] = useState(false);
          
          const [toastMessage, setToastMessage] = useState("");
          const showMessage = (msg) => {
              setToastMessage(msg);
              setTimeout(() => setToastMessage(""), 5000);
          };

          const getToday = () => new Date().toISOString().split('T')[0];
          const [taskTitle, setTaskTitle] = useState("");
          const [taskDesc, setTaskDesc] = useState("");
          const [taskDate, setTaskDate] = useState(getToday());
          const [taskTime, setTaskTime] = useState("23:59");
          const [allowLate, setAllowLate] = useState(false);
          
          const [isAiLoading, setIsAiLoading] = useState(false);
          const [prevTaskTitle, setPrevTaskTitle] = useState("");
          const [prevTaskDesc, setPrevTaskDesc] = useState("");
          const [hasAiModified, setHasAiModified] = useState(false);

          const [reviewTopic, setReviewTopic] = useState("");
          const [reviewCount, setReviewCount] = useState(3);
          const [isReviewLoading, setIsReviewLoading] = useState(false);
          const [activeReview, setActiveReview] = useState(null);
          const [currentSlide, setCurrentSlide] = useState(0);
          
          const [studentQuizAnswer, setStudentQuizAnswer] = useState("");
          const [quizAttempts, setQuizAttempts] = useState(0);
          const [quizFeedback, setQuizFeedback] = useState("");
          const [showQuizAnswer, setShowQuizAnswer] = useState(false);
          const [isEvaluatingQuiz, setIsEvaluatingQuiz] = useState(false);

          const [draftReview, setDraftReview] = useState(null); 
          const [slideInstructions, setSlideInstructions] = useState({}); 
          const [loadingSlides, setLoadingSlides] = useState({}); 

          useEffect(() => {
            setStudentQuizAnswer("");
            setQuizAttempts(0);
            setQuizFeedback("");
            setShowQuizAnswer(false);
          }, [currentSlide, activeReview]);

          const [tasks, setTasks] = useState([]);
          const [syllabus, setSyllabus] = useState([]);
          const [evaluations, setEvaluations] = useState([]);
          const [grades, setGrades] = useState([]);
          const [suggestions, setSuggestions] = useState([]);
          const [alerts, setAlerts] = useState([]);
          const [reviews, setReviews] = useState([]); 

          // --- FUNCIÓN IA (CONECTADA A VERCEL DE FORMA SEGURA) ---
          const callGemini = async (promptText) => {
            try {
              const res = await fetch('/api/gemini', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ promptText: promptText }) 
              });
              
              if (!res.ok) {
                showMessage(`❌ Error de conexión con Vercel (${res.status}). Verifica tu backend.`);
                return ""; 
              }
              
              const data = await res.json();
              return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
              
            } catch (error) {
              showMessage("❌ Error de red: No se pudo conectar con el backend de Vercel.");
              return "";
            }
          };

          const handleGenerateReview = async (e) => {
            e.preventDefault();
            if (!reviewTopic) return;
            setIsReviewLoading(true);

            const prompt = `Actúa como un profesor de inglés. Crea una presentación de repaso sobre: "${reviewTopic}". 
            Genera exactamente ${reviewCount} diapositivas. Usa EMOJIS.
            Devuelve ÚNICAMENTE un JSON válido:
            [
              { "type": "info", "title": "Título con emoji", "content": "Texto del párrafo." },
              { "type": "quiz", "title": "Pregunta rápida 🤔", "question": "¿Qué verbo falta aquí?", "answer": "Falta el verbo 'is'." }
            ]`;
            
            try {
              const result = await callGemini(prompt);
              if (!result) { setIsReviewLoading(false); return; }

              const cleanedJson = result.replace(/```json/gi, '').replace(/```/gi, '').trim();
              const generatedSlides = JSON.parse(cleanedJson);
              
              generatedSlides.forEach((s, idx) => { s.gradient = SLIDE_GRADIENTS[idx % SLIDE_GRADIENTS.length]; });
              const mainTitle = generatedSlides[0]?.title || "Nuevo Repaso de Inglés ✨";

              setDraftReview({ topic: mainTitle, slides: generatedSlides });
              setReviewTopic("");
            } catch (err) {
              showMessage("Hubo un error al leer la respuesta de la IA. Intente de nuevo.");
            }
            setIsReviewLoading(false);
          };

          const handleRegenerateSingleSlide = async (index) => {
            const instruction = slideInstructions[index];
            if (!instruction) return showMessage("Escribe una instrucción para modificar esta diapositiva.");
            
            setLoadingSlides(prev => ({ ...prev, [index]: true }));

            const currentSlideData = draftReview.slides[index];
            const prompt = `Modifica la diapositiva basándote en: "${instruction}".
            Diapositiva: ${JSON.stringify(currentSlideData)}
            Devuelve ÚNICAMENTE un JSON válido (info o quiz).`;

            try {
              const result = await callGemini(prompt);
              if (!result) { setLoadingSlides(prev => ({ ...prev, [index]: false })); return; }

              const cleanedJson = result.replace(/```json/gi, '').replace(/```/gi, '').trim();
              const regeneratedSlide = JSON.parse(cleanedJson);
              regeneratedSlide.gradient = currentSlideData.gradient;

              const newSlides = [...draftReview.slides];
              newSlides[index] = regeneratedSlide;
              setDraftReview({ ...draftReview, slides: newSlides });
              
              const newInstructions = { ...slideInstructions };
              newInstructions[index] = "";
              setSlideInstructions(newInstructions);
            } catch (err) {
              showMessage("No se pudo regenerar esta diapositiva.");
            }
            setLoadingSlides(prev => ({ ...prev, [index]: false }));
          };

          const handlePublishDraft = async () => {
            if (!draftReview) return;
            try {
              await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reviews'), {
                topic: draftReview.topic, slides: draftReview.slides, createdAt: Date.now()
              });
              setDraftReview(null);
              showMessage("✅ Repaso publicado exitosamente.");
            } catch (err) {
              showMessage("Error al publicar.");
            }
          };

          const handleQuizSubmit = async (e) => {
            e.preventDefault();
            if (!studentQuizAnswer.trim()) return;
            setIsEvaluatingQuiz(true);

            const currentAttempt = quizAttempts + 1;
            setQuizAttempts(currentAttempt);
            const activeSlide = activeReview.slides[currentSlide];

            if (currentAttempt >= 3) {
              setQuizFeedback("¡Buen esfuerzo! 🌟 Aquí tienes la respuesta para que la repases.");
              setShowQuizAnswer(true); setIsEvaluatingQuiz(false); return;
            }

            const prompt = `Un estudiante responde un quiz de inglés. Pregunta: "${activeSlide.question}". Esperada: "${activeSlide.answer}". Respuesta estudiante: "${studentQuizAnswer}". Evalúa si es correcta. Responde ÚNICAMENTE con JSON: {"isCorrect": true/false, "feedback": "Mensaje animando o felicitando"}`;

            try {
              const res = await callGemini(prompt);
              if (!res) { setIsEvaluatingQuiz(false); return; }

              const json = JSON.parse(res.replace(/```json/gi, '').replace(/```/gi, '').trim());
              setQuizFeedback(json.feedback);
              if(json.isCorrect) setShowQuizAnswer(true);
            } catch(err) {
              setQuizFeedback("¡Ups! Hubo un error al revisar, intenta de nuevo ✨");
            }
            setIsEvaluatingQuiz(false);
          };

          const handleSubmitSuggestion = async (e) => {
            e.preventDefault();
            if (!sugName || !sugText) return;
            setIsSugLoading(true);

            const prompt = `Analiza la sugerencia. Si contiene ofensas, responde "RECHAZADO". Si es constructiva, reescríbela formalmente para la profesora. Devuelve SÓLO la versión mejorada o "RECHAZADO".\n\nTexto: ${sugText}`;
            const result = await callGemini(prompt);
            
            if (!result) { setIsSugLoading(false); return; }

            if (result.trim() === "RECHAZADO") {
              showMessage("⚠️ No se permiten groserías ni comentarios ofensivos.");
              await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'alerts'), { studentName: sugName, originalText: sugText, createdAt: Date.now() });
            } else {
              await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'suggestions'), { studentName: sugName, text: result, createdAt: Date.now() });
              showMessage("✅ Sugerencia enviada correctamente.");
              setShowSugModal(false); setSugText("");
            }
            setIsSugLoading(false);
          };

          const handleAiGenerate = async () => {
            if (!taskDesc && !taskTitle) return showMessage("Escribe una idea en la descripción primero.");
            setPrevTaskTitle(taskTitle); setPrevTaskDesc(taskDesc); setIsAiLoading(true);
            
            const prompt = `Mejora esta tarea de inglés: Título: ${taskTitle}\nDescripción: ${taskDesc}\nDevuelve SÓLO en formato:\nTITULO: [Título nuevo]\nDESCRIPCION: [Descripción detallada]`;
            const result = await callGemini(prompt);
            
            if (!result) { setIsAiLoading(false); return; }

            const titleMatch = result.match(/(?:T[IÍ]TULO|TITLE|TITULO)\s*[:\-]?\s*\*?\*?\s*(.*)/i);
            const descMatch = result.match(/(?:DESCRIPCI[OÓ]N|DESCRIPTION|DESCRIPCION)\s*[:\-]?\s*\*?\*?\s*([\s\S]*)/i);
            
            if (titleMatch && descMatch) { 
              setTaskTitle(titleMatch[1].replace(/\*/g, '').trim()); 
              setTaskDesc(descMatch[1].trim()); 
            } else {
              setTaskDesc(result);
            }
            setHasAiModified(true);
            setIsAiLoading(false);
          };

          const handleAiCorrect = async () => {
            if (!taskDesc) return showMessage("Escribe algo en la descripción para corregir.");
            setPrevTaskTitle(taskTitle); setPrevTaskDesc(taskDesc); setIsAiLoading(true);
            
            const prompt = `Corrige la ortografía y gramática manteniendo el idioma original. Devuelve SÓLO el texto corregido:\n\n${taskDesc}`;
            const result = await callGemini(prompt);
            
            if (!result) { setIsAiLoading(false); return; }

            setTaskDesc(result); 
            setHasAiModified(true);
            setIsAiLoading(false);
          };

            const titleMatch = result.match(/(?:T[IÍ]TULO|TITLE|TITULO)\s*[:\-]?\s*\*?\*?\s*(.*)/i);
            const descMatch = result.match(/(?:DESCRIPCI[OÓ]N|DESCRIPTION|DESCRIPCION)\s*[:\-]?\s*\*?\*?\s*([\s\S]*)/i);
            
            if (titleMatch && descMatch) { 
              setTaskTitle(titleMatch[1].replace(/\*/g, '').trim());

            }

            setIsAiLoading(false);
          };

            if (e.target.username.value === 'GinaDocente' && e.target.password.value === 'DANTE12345') {

                        <p className="font-bold text-red-800 text-sm mb-1">Estudiante: {a.studentName}</p>
                        <p className="text-red-900 font-medium italic">" {a.originalText} "</p>
                        <p className="text-xs text-red-400 mt-2">{new Date(a.createdAt).toLocaleString()}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );

          return (
            <div className={`min-h-screen bg-gradient-to-br ${isDarkMode ? 'from-gray-900 via-slate-900 to-black' : 'from-red-50/80 via-gray-100/90 to-red-100/80'} font-sans relative overflow-hidden transition-colors duration-500 ${isDarkMode ? 'dark-mode' : ''}`}>
              <style>{`
                .dark-mode .text-gray-900 { color: #f9fafb !important; }
                .dark-mode .text-gray-800 { color: #f3f4f6 !important; }
                .dark-mode .text-gray-700 { color: #d1d5db !important; }
                .dark-mode .text-gray-600 { color: #9ca3af !important; }
                .dark-mode .text-gray-500 { color: #6b7280 !important; }
                
                .dark-mode [class*="bg-white/20"] { background-color: rgba(0, 0, 0, 0.4) !important; border-color: rgba(255, 255, 255, 0.1) !important; }
                .dark-mode [class*="bg-white/30"] { background-color: rgba(0, 0, 0, 0.5) !important; border-color: rgba(255, 255, 255, 0.15) !important; }
                .dark-mode [class*="bg-white/40"] { background-color: rgba(0, 0, 0, 0.6) !important; border-color: rgba(255, 255, 255, 0.2) !important; }
                .dark-mode [class*="bg-white/50"] { background-color: rgba(0, 0, 0, 0.7) !important; border-color: rgba(255, 255, 255, 0.25) !important; }
                .dark-mode [class*="bg-white/60"] { background-color: rgba(0, 0, 0, 0.8) !important; border-color: rgba(255, 255, 255, 0.3) !important; }
                .dark-mode [class*="bg-white/80"] { background-color: rgba(0, 0, 0, 0.9) !important; border-color: rgba(255, 255, 255, 0.4) !important; }
                
                .dark-mode [class*="border-white/"] { border-color: rgba(255, 255, 255, 0.2) !important; }
                .dark-mode [class*="bg-red-100/"] { background-color: rgba(153, 27, 27, 0.2) !important; border-color: rgba(220, 38, 38, 0.3) !important; }
                .dark-mode [class*="bg-red-50"] { background-color: rgba(69, 10, 10, 0.4) !important; }
                .dark-mode [class*="text-red-600"] { color: #f87171 !important; }
                .dark-mode [class*="bg-green-100/"] { background-color: rgba(6, 78, 59, 0.4) !important; border-color: rgba(52, 211, 153, 0.3) !important; }
                .dark-mode [class*="text-green-700"] { color: #34d399 !important; }
                .dark-mode [class*="bg-indigo-50/"] { background-color: rgba(49, 46, 129, 0.5) !important; border-color: rgba(129, 140, 248, 0.3) !important; }
                .dark-mode [class*="text-indigo-800"] { color: #818cf8 !important; }
                
                /* Margen extra para que la barra inferior en celular no tape el contenido final */
                .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
              `}</style>
              
              <div className="absolute top-[-15%] left-[-10%] w-[50%] h-[50%] bg-[#AD3333]/15 rounded-full blur-[100px] pointer-events-none" />
              <div className="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-blue-300/15 rounded-full blur-[120px] pointer-events-none" />

              {showSugModal && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/30 backdrop-blur-sm p-4">
                  <form onSubmit={handleSubmitSuggestion} className={`${glassCard} max-w-md w-full flex flex-col gap-4 relative animate-in fade-in zoom-in duration-200`}>
                    <button type="button" onClick={() => setShowSugModal(false)} className="absolute top-4 right-4 text-gray-500 hover:text-[#AD3333] transition-colors"><X size={24}/></button>
                    <h3 className="text-2xl font-bold text-center text-gray-800 drop-shadow-sm flex items-center justify-center gap-2"><Mail className="text-[#AD3333]"/> Enviar Sugerencia</h3>
                    <p className="text-xs text-center text-gray-600 mb-2">Buzón de sugerencias para mejorar las clases.</p>
                    <input value={sugName} onChange={e => setSugName(e.target.value)} placeholder="Tu nombre completo" className={glassInput} required />
                    <textarea value={sugText} onChange={e => setSugText(e.target.value)} placeholder="Escribe tu idea para mejorar la clase..." className={`${glassInput} h-32 resize-none`} required />
                    <button type="submit" disabled={isSugLoading} className={`${redButton} w-full mt-2 disabled:opacity-50`}>{isSugLoading ? 'Enviando...' : 'Enviar'}</button>
                  </form>
                </div>
              )}

              {showLogin && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/20 backdrop-blur-sm p-4 transition-all">
                  <form onSubmit={handleLogin} className={`${glassCard} max-w-sm w-full flex flex-col gap-5 relative animate-in fade-in zoom-in duration-200`}>
                    <button type="button" onClick={() => setShowLogin(false)} className="absolute top-4 right-4 text-gray-500 hover:text-[#AD3333] transition-colors"><X size={24}/></button>
                    <h3 className="text-2xl font-bold text-center text-gray-800 mb-2 drop-shadow-sm">Acceso</h3>
                    <div><label className="text-xs font-bold text-gray-700 ml-2">Usuario</label><input name="username" placeholder="Pon tu usuario" className={glassInput} required /></div>
                    <div><label className="text-xs font-bold text-gray-700 ml-2">Contraseña</label><input name="password" type="password" placeholder="••••••••" className={glassInput} required /></div>
                    {loginError && <p className="text-[#AD3333] text-sm text-center font-bold bg-white/50 py-2 rounded-lg">{loginError}</p>}
                    <button type="submit" className={`${redButton} w-full`}>Ingresar</button>
                  </form>
                </div>
              )}

              {/* BARRA SUPERIOR (Se mantiene el texto para PC, se ocultan botones en celular) */}
              <nav className="sticky top-0 z-50 bg-white/20 backdrop-blur-xl border-b border-white/40 px-4 md:px-6 py-4 flex justify-between items-center shadow-sm">
                <div className="flex items-center gap-3">
                  <button onClick={() => role === 'teacher' ? setRole('student') : setShowLogin(true)} className="w-11 h-11 min-w-[44px] bg-gradient-to-br from-[#AD3333] to-[#8a2828] rounded-xl flex items-center justify-center text-white font-extrabold shadow-lg shadow-[#AD3333]/40 hover:scale-105 transition-transform border border-white/20" title={role === 'teacher' ? "Cerrar sesión" : "Acceso Docente"}>UP</button>
                  <div>
                    {/* MODIFICACIÓN: Cambio de título a English TECH */}
                    <h1 className="text-xl font-extrabold text-gray-800 leading-tight drop-shadow-sm">English TECH</h1>
                    <p className="text-xs text-[#AD3333] font-bold">Universidad de Pamplona</p>
                  </div>
                </div>

                <div className="flex gap-2 items-center">
                  {/* MENÚ DE ESCRITORIO: Oculto en móviles (hidden md:flex) */}
                  <div className="hidden md:flex gap-2 items-center">
                    <button onClick={() => setActiveTab('tasks')} className={`${activeTab === 'tasks' ? 'bg-white/60 shadow-md font-bold' : 'hover:bg-white/40 font-medium'} px-4 py-2 rounded-full transition text-sm text-gray-800`}>Asignaciones</button>
                    <button onClick={() => setActiveTab('reviews')} className={`${activeTab === 'reviews' ? 'bg-[#AD3333] text-white shadow-md font-bold' : 'hover:bg-white/40 font-medium'} px-4 py-2 rounded-full transition text-sm text-gray-800 hover:text-gray-900 flex items-center gap-1`}>Repasos</button>
                    <button onClick={() => setActiveTab('syllabus')} className={`${activeTab === 'syllabus' ? 'bg-white/60 shadow-md font-bold' : 'hover:bg-white/40 font-medium'} px-4 py-2 rounded-full transition text-sm text-gray-800`}>Contenidos programáticos</button>
                    <button onClick={() => setActiveTab('evaluations')} className={`${activeTab === 'evaluations' ? 'bg-white/60 shadow-md font-bold' : 'hover:bg-white/40 font-medium'} px-4 py-2 rounded-full transition text-sm text-gray-800`}>Evaluaciones</button>
                    <div className="w-px h-6 bg-gray-400 mx-2"></div>
                  </div>
                  
                  {/* Botones siempre visibles (Sol/Luna y Sugerencias/Buzón) */}
                  <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-full bg-white/40 hover:bg-white/60 text-gray-800 transition-all shadow-sm border border-white/50" title="Alternar Modo Oscuro">
                    {isDarkMode ? <Sun size={18} /> : <Moon size={18} />}
                  </button>
                  
                  {role === 'student' ? (
                    <button onClick={() => setShowSugModal(true)} className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-md font-bold px-3 py-2 rounded-full hover:scale-105 transition flex items-center gap-1 text-sm"><Mail size={16}/><span className="hidden sm:inline">Sugerencias</span></button>
                  ) : (
                    <button onClick={() => setActiveTab('inbox')} className={`${activeTab === 'inbox' ? 'bg-[#AD3333] text-white shadow-md font-bold' : 'bg-white/60 hover:bg-white/80 font-bold text-gray-800'} px-3 py-2 rounded-full transition flex items-center gap-1 text-sm`}>
                      <Mail size={16}/><span className="hidden sm:inline">Buzón</span> {alerts.length > 0 && <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse" />}
                    </button>
                  )}
                </div>
              </nav>

              {/* CONTENIDO PRINCIPAL (Con espacio extra abajo solo en celulares pb-24) */}
              <main className="max-w-5xl mx-auto p-4 md:p-8 pb-28 md:pb-8 relative z-10">
                {activeTab === 'tasks' && renderTasks()}
                {activeTab === 'reviews' && renderReviews()}
                {activeTab === 'syllabus' && renderSyllabus()}
                {activeTab === 'evaluations' && renderEvaluations()}
                {activeTab === 'inbox' && role === 'teacher' && renderInbox()}
              </main>

              {/* BARRA INFERIOR (Solo visible en celulares - md:hidden) */}
              <nav className="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t border-gray-200 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] flex justify-around items-center pt-3 pb-safe md:hidden z-50">
                <button onClick={() => setActiveTab('tasks')} className={`flex flex-col items-center justify-center p-2 rounded-2xl transition-all w-16 h-16 ${activeTab === 'tasks' ? 'bg-gray-800 text-white scale-105 shadow-md' : 'text-gray-500 hover:bg-gray-100'}`}>
                  <NavNotebook size={24} />
                </button>
                <button onClick={() => setActiveTab('reviews')} className={`flex flex-col items-center justify-center p-2 rounded-2xl transition-all w-16 h-16 ${activeTab === 'reviews' ? 'bg-[#AD3333] text-white scale-105 shadow-md' : 'text-gray-500 hover:bg-gray-100'}`}>
                  <NavSlides size={24} />
                </button>
                <button onClick={() => setActiveTab('syllabus')} className={`flex flex-col items-center justify-center p-2 rounded-2xl transition-all w-16 h-16 ${activeTab === 'syllabus' ? 'bg-gray-800 text-white scale-105 shadow-md' : 'text-gray-500 hover:bg-gray-100'}`}>
                  <NavCalendar size={24} />
                </button>
                <button onClick={() => setActiveTab('evaluations')} className={`flex flex-col items-center justify-center p-2 rounded-2xl transition-all w-16 h-16 ${activeTab === 'evaluations' ? 'bg-gray-800 text-white scale-105 shadow-md' : 'text-gray-500 hover:bg-gray-100'}`}>
                  <NavFile size={24} />
                </button>
              </nav>

              {toastMessage && (
                <div className="fixed bottom-24 md:bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900/95 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-2xl z-[200] font-medium text-sm text-center border border-gray-700 whitespace-nowrap">
                  {toastMessage}
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
