<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plataforma English TECH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 overscroll-none">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;
        
        // --- IMPORTACIONES FIREBASE ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Íconos de Lucide
        const createIcon = (emoji) => (p) => <span style={{fontSize: p.size||16}} className={p.className}>{emoji}</span>;
        const BookOpen = createIcon('📖'); const CalendarEmoji = createIcon('📅'); const Plus = createIcon('➕'); 
        const Trash2 = createIcon('🗑️'); const X = createIcon('❌'); const Sparkles = createIcon('✨');
        const CheckCheck = createIcon('✅'); const Loader2 = createIcon('⏳'); const Undo2 = createIcon('↩️'); 
        const Clock = createIcon('⏰'); const Lock = createIcon('🔒'); const Mail = createIcon('📥'); 
        const AlertTriangle = createIcon('⚠️'); const ChevronRight = createIcon('➡️'); const ChevronLeft = createIcon('⬅️'); 
        const Edit3 = createIcon('✏️'); const Palette = createIcon('🎨'); const UsersIcon = createIcon('👥');
        const FileText = createIcon('📄');
        
        // Íconos SVG
        const CuteBotIcon = (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>;
        const Sun = (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const Moon = (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
        const LogOutIcon = (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
        const ArrowRightIcon = (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
        const SmileIcon = (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></svg>;

        const NavNotebook = (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>;
        const NavSlides = (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5-5 5 5"/></svg>;
        const NavCalendar = (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const NavFile = (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;

        // --- CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = {
          apiKey: "AIzaSyB-BDGpMhiNjSfGiGiGHHd6jbu5nQvoOfs",
          authDomain: "ginadocente-unipamplona.firebaseapp.com",
          projectId: "ginadocente-unipamplona",
          storageBucket: "ginadocente-unipamplona.firebasestorage.app",
          messagingSenderId: "628380121872",
          appId: "1:628380121872:web:4766b1e2964b023f838395",
          measurementId: "G-6QKYMFPRHH"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // INSTANCIA SECUNDARIA (Truco para que la profe cree usuarios sin cerrar su sesión)
        const secondaryApp = initializeApp(firebaseConfig, "SecondaryApp");
        const secondaryAuth = getAuth(secondaryApp);

        const appId = 'unipamplona-english-app';

        const glassCard = "bg-white/20 backdrop-blur-2xl border border-white/40 shadow-[0_8px_32px_0_rgba(173,51,51,0.1)] rounded-3xl p-6 transition-all duration-300";
        const glassInput = "w-full bg-white/30 backdrop-blur-md border border-white/50 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-[#AD3333]/50 focus:border-[#AD3333] transition-all placeholder-gray-600 text-gray-900 shadow-inner";
        const redButton = "bg-[#AD3333]/90 backdrop-blur-md text-white px-6 py-3 rounded-full font-semibold shadow-lg shadow-[#AD3333]/30 hover:shadow-[0_0_25px_#AD3333] hover:bg-[#8a2828] transition-all duration-300 flex items-center justify-center gap-2";
        const outlineButton = "bg-white/20 backdrop-blur-md text-gray-800 border border-gray-400 px-6 py-3 rounded-full font-semibold hover:bg-gray-200 transition-all duration-300 flex items-center justify-center gap-2";

        const REACTION_EMOJIS = { like: '👍', love: '❤️', sad: '😢', happy: '😃', wow: '😲' };
        const COMMENT_EMOJIS = ['😀', '😂', '🥰', '😎', '👍', '🙏', '❤️', '🔥', '✨', '🤔'];

        const SLIDE_GRADIENTS = [
          "from-blue-400/40 to-indigo-500/40", "from-emerald-400/40 to-teal-500/40", "from-rose-400/40 to-orange-500/40",
          "from-purple-400/40 to-pink-500/40", "from-amber-400/40 to-red-500/40", "from-cyan-400/40 to-blue-500/40"
        ];

        // Mapeo inicial de emergencia por si la BD falla
        const FALLBACK_MAP = {
            'ginadocente': { email: 'ginamarcelaquintana19@gmail.com', name: 'La profe', role: 'teacher' },
            'camilopruebas': { email: 'edwincamilojaimes1@gmail.com', name: 'Edwin Camilo Jaimes Castañeda', role: 'student' }
        };

        const TaskCard = ({ task, role, db, appId, glassInput, callGemini, currentUser, showMessage, loggedInName }) => {
          const [commentText, setCommentText] = useState("");
          const [isProcessing, setIsProcessing] = useState(false);
          const [showEmojiPicker, setShowEmojiPicker] = useState(false);
          const [activeReactionCommentId, setActiveReactionCommentId] = useState(null);
          
          const [editingCommentId, setEditingCommentId] = useState(null);
          const [editCommentText, setEditCommentText] = useState("");
          const [revealedComments, setRevealedComments] = useState({}); 
          const [historyOpenCid, setHistoryOpenCid] = useState(null); // Nuevo estado para el historial

          const deadline = new Date(`${task.dueDate}T${task.dueTime || '23:59'}`);
          const isExpired = new Date() > deadline;
          const isLocked = task.type !== 'post' && isExpired && !task.allowLate;

          const cardStyle = isExpired && task.type !== 'post'
            ? "bg-red-900/10 backdrop-blur-2xl border border-red-500/40 shadow-[0_8px_32px_0_rgba(220,38,38,0.15)] rounded-3xl p-6 transition-all duration-300"
            : glassCard;

          const handleTranslate = async (lang) => {
            if (!commentText) return;
            setIsProcessing(true);
            const prompt = `Traduce el siguiente comentario al ${lang} de forma profesional y natural. Devuelve ÚNICAMENTE la traducción, sin explicaciones ni comillas:\n\n${commentText}`;
            const result = await callGemini(prompt);
            if (result) setCommentText(result);
            setIsProcessing(false);
          };

          const toggleReaction = async (type) => {
            if (isLocked || !currentUser) return;
            const newReactions = { ...(task.reactions || {}) };
            const currentReactionData = newReactions[currentUser.uid];
            const currentType = typeof currentReactionData === 'object' ? currentReactionData.type : currentReactionData;

            if (currentType === type) delete newReactions[currentUser.uid];
            else newReactions[currentUser.uid] = { type: type, name: loggedInName };
            
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { ...task, reactions: newReactions });
          };

          const toggleCommentReaction = async (commentId, emoji) => {
            if (isLocked || !currentUser) return;
            const updatedComments = (task.comments || []).map((c, i) => {
                const currentCid = c.id || `old-${i}`; 
                if (currentCid === commentId) {
                    // Solo modifica ESTE comentario estrictamente
                    const reactions = { ...(c.reactions || {}) };
                    const currentReact = reactions[currentUser.uid];
                    const currentEmoji = typeof currentReact === 'object' ? currentReact.emoji : currentReact;
                    
                    if (currentEmoji === emoji) {
                        delete reactions[currentUser.uid];
                    } else {
                        reactions[currentUser.uid] = { emoji: emoji, name: loggedInName };
                    }
                    return { ...c, reactions };
                }
                return c; // Los demás comentarios quedan intactos
            });
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { ...task, comments: updatedComments });
          };

          const handleDeleteComment = async (commentId, authorName) => {
              let updatedComments;
              if (role === 'teacher') {
                  updatedComments = task.comments.filter((c, i) => (c.id || `old-${i}`) !== commentId);
              } else {
                  updatedComments = task.comments.map((c, i) => 
                      (c.id || `old-${i}`) === commentId ? { ...c, isDeleted: true } : c
                  );
              }
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { ...task, comments: updatedComments });
          };

          const saveEditedComment = async () => {
              if (!editCommentText.trim()) return;
              const updatedComments = task.comments.map((c, i) => {
                  const cid = c.id || `old-${i}`;
                  if (cid === editingCommentId) {
                      const history = c.editHistory || [];
                      return { 
                          ...c, 
                          text: editCommentText.trim(), 
                          isEdited: true, 
                          editHistory: [{ text: c.text, date: Date.now() }, ...history] // Guardamos historial
                      };
                  }
                  return c;
              });
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { ...task, comments: updatedComments });
              setEditingCommentId(null);
          };

          const handleAddComment = async (e) => {
            e.preventDefault();
            if(!commentText.trim()) return;
            setIsProcessing(true);

            const prompt = `Analiza si el siguiente texto contiene groserías, insultos o lenguaje inapropiado en español, inglés o francés. Responde ÚNICAMENTE "SI" o "NO".\nTexto: "${commentText}"`;
            const filterResult = await callGemini(prompt);
            
            if (filterResult?.trim().toUpperCase().includes("SI")) {
                showMessage("⚠️ Comentario bloqueado: Lenguaje inapropiado detectado.");
                setIsProcessing(false);
                return;
            }

            const newComment = { 
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5), 
                author: role === 'teacher' ? 'La profe' : loggedInName, 
                text: commentText.trim(),
                isDeleted: false,
                reactions: {}
            };
            
            const newComments = [...(task.comments || []), newComment];
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { ...task, comments: newComments });
            setCommentText("");
            setShowEmojiPicker(false);
            setIsProcessing(false);
          };

          const renderReactions = () => {
            const counts = { like: 0, love: 0, sad: 0, happy: 0, wow: 0 };
            const namesByType = { like: [], love: [], sad: [], happy: [], wow: [] };

            Object.values(task.reactions || {}).forEach(r => { 
                const rType = typeof r === 'object' ? r.type : r;
                let rName = typeof r === 'object' ? r.name : 'Un usuario';
                if (rName === 'Profesora') rName = 'La profe';

                if (counts[rType] !== undefined) { 
                    counts[rType]++; 
                    namesByType[rType].push(rName);
                } 
            });

            return (
              <div className="flex gap-2 mt-4 flex-wrap">
                {Object.entries(REACTION_EMOJIS).map(([key, emoji]) => {
                  const rData = task.reactions?.[currentUser?.uid];
                  const userReactionType = typeof rData === 'object' ? rData.type : rData;
                  const isSelected = userReactionType === key;
                  const hoverText = namesByType[key].length > 0 ? `${namesByType[key].join(', ')} reaccionó así` : "";

                  return (
                    <button 
                      key={key} onClick={() => toggleReaction(key)} disabled={isLocked} title={hoverText}
                      className={`flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-bold transition-all border ${isSelected ? 'bg-white/60 border-[#AD3333] shadow-sm scale-105' : 'bg-white/30 border-white/40 hover:bg-white/50'} ${isLocked ? 'opacity-50 cursor-not-allowed' : ''}`}
                    >
                      {emoji} {counts[key] > 0 && <span className="text-gray-800">{counts[key]}</span>}
                    </button>
                  );
                })}
              </div>
            );
          };

          return (
            <div className={`${cardStyle} group ${!isLocked && 'hover:bg-white/30'}`}>
              <div className="flex justify-between items-start">
                <div>
                  <div className="flex items-center gap-2 mb-1">
                      <span className={`text-[10px] font-black uppercase tracking-wider px-2 py-1 rounded-md ${task.type === 'post' ? 'bg-blue-100 text-blue-700' : 'bg-[#AD3333]/20 text-[#AD3333]'}`}>
                          {task.type === 'post' ? 'Publicación' : 'Tarea'}
                      </span>
                  </div>
                  <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                    {task.title} {isLocked && <Lock size={18} className="text-red-600" />}
                  </h3>
                  {task.type !== 'post' && (
                      <p className={`text-sm font-bold mt-1 flex items-center gap-1 ${isExpired ? 'text-red-600' : 'text-[#AD3333]'}`}>
                        <Clock size={14} /> Vence: {task.dueDate} a las {task.dueTime || '23:59'} 
                        {isExpired && (task.allowLate ? " (Se aceptan entregas tardías)" : " (Cerrado)")}
                      </p>
                  )}
                </div>
                {role === 'teacher' && (
                  <button onClick={() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id))} className="text-gray-400 hover:text-red-600 transition relative z-10">
                    <Trash2 size={20} />
                  </button>
                )}
              </div>
              <p className="mt-4 text-gray-800 whitespace-pre-wrap leading-relaxed">{task.description}</p>
              {renderReactions()}

              <div className="mt-6 pt-6 border-t border-white/30">
                <h4 className="text-sm font-bold text-gray-700 mb-3 drop-shadow-sm">Comentarios</h4>
                <div className="space-y-3 mb-4 max-h-40 overflow-y-auto pr-2 relative z-10">
                  {task.comments?.map((c, i) => {
                    const cid = c.id || `old-${i}`; 
                    const isOwner = c.author === loggedInName || (role === 'teacher' && (c.author === 'Profesora' || c.author === 'La profe'));
                    const isEditing = editingCommentId === cid;
                    
                    if (c.isDeleted) {
                        // Solo la profesora o el autor pueden ver que se eliminó
                        if (role === 'teacher' || isOwner) {
                            return (
                                <div key={cid} className="bg-white/20 p-3 rounded-xl text-xs text-gray-500 italic border border-white/30 flex flex-col gap-2">
                                    <div className="flex justify-between items-center">
                                        <span>{c.author} borró el comentario.</span>
                                        {role === 'teacher' && (
                                            <button onClick={() => setRevealedComments(prev => ({...prev, [cid]: !prev[cid]}))} className="text-blue-600 hover:text-blue-800 font-bold bg-white/50 px-2 py-1 rounded shadow-sm transition-all">
                                                {revealedComments[cid] ? "Ocultar" : "Revelar"}
                                            </button>
                                        )}
                                    </div>
                                    {role === 'teacher' && revealedComments[cid] && (
                                        <p className="text-gray-700 bg-white/40 p-2 rounded line-through not-italic mt-1">{c.text}</p>
                                    )}
                                </div>
                            );
                        }
                        return null; // Oculto sin rastro para el resto de estudiantes
                    }

                    return (
                        <div key={cid} className="bg-white/40 backdrop-blur-md p-3 rounded-xl text-sm border border-white/30 group/comment">
                          <div className="flex justify-between items-start">
                              <span className={`font-bold ${c.author === 'Profesora' || c.author === 'La profe' ? 'text-[#AD3333]' : 'text-gray-800'}`}>{c.author}</span>
                              
                              <div className="hidden group-hover/comment:flex items-center gap-2">
                                  {isOwner && !isEditing && (
                                      <button onClick={() => {setEditingCommentId(cid); setEditCommentText(c.text);}} className="text-gray-400 hover:text-blue-600"><Edit3 size={14}/></button>
                                  )}
                                  {(role === 'teacher' || isOwner) && !isEditing && (
                                      <button onClick={() => handleDeleteComment(cid, c.author)} className="text-gray-400 hover:text-red-600"><Trash2 size={14}/></button>
                                  )}
                              </div>
                          </div>

                          {isEditing ? (
                              <div className="mt-2 flex gap-2 items-center">
                                  <input className={`${glassInput} py-1 px-2 text-sm`} value={editCommentText} onChange={e => setEditCommentText(e.target.value)} />
                                  <button onClick={saveEditedComment} className="text-green-600 bg-white/50 p-1.5 rounded-lg hover:bg-white/80"><CheckCheck size={16}/></button>
                                  <button onClick={() => setEditingCommentId(null)} className="text-red-600 bg-white/50 p-1.5 rounded-lg hover:bg-white/80"><X size={16}/></button>
                              </div>
                          ) : (
                              <div className="flex gap-2 items-baseline flex-wrap">
                                  <p className="text-gray-800 mt-1">{c.text}</p>
                                  {c.isEdited && (
                                      <div className="relative inline-block mt-1">
                                          <button onClick={() => setHistoryOpenCid(historyOpenCid === cid ? null : cid)} className="text-[10px] text-blue-600 hover:text-blue-800 italic bg-white/50 px-1.5 py-0.5 rounded shadow-sm border border-white/60">✏️ Editado</button>
                                          {historyOpenCid === cid && (
                                              <div className="absolute top-full left-0 mt-1 bg-white/95 backdrop-blur-xl border border-gray-200 shadow-xl rounded-lg p-2 z-50 w-56">
                                                  <p className="text-xs font-bold text-gray-700 mb-2 border-b border-gray-300 pb-1">Historial de ediciones</p>
                                                  {c.editHistory?.map((h, hi) => (
                                                      <div key={hi} className="mb-2 pb-2 border-b border-gray-200 last:border-0 last:mb-0 last:pb-0">
                                                          <p className="text-[9px] text-gray-500 mb-0.5">{new Date(h.date).toLocaleString()}</p>
                                                          <p className="text-xs text-gray-600 line-through">{h.text}</p>
                                                      </div>
                                                  ))}
                                              </div>
                                          )}
                                      </div>
                                  )}
                              </div>
                          )}

                          {/* Reacciones en comentarios */}
                          <div className="mt-2 flex gap-1 items-center flex-wrap">
                              {Object.entries(c.reactions || {}).reduce((acc, [uid, rData]) => {
                                  const emoji = typeof rData === 'object' ? rData.emoji : rData;
                                  let name = typeof rData === 'object' ? rData.name : 'Un usuario';
                                  if (name === 'Profesora') name = 'La profe';
                                  
                                  const existing = acc.find(item => item.emoji === emoji);
                                  if (existing) { existing.count++; existing.names.push(name); } 
                                  else { acc.push({ emoji, count: 1, names: [name] }); }
                                  return acc;
                              }, []).map((r, idx) => (
                                  <span key={idx} title={`${r.names.join(', ')} reaccionó así`} className="bg-white/50 px-1.5 py-0.5 rounded-full text-[10px] text-gray-700 border border-white/60 cursor-help">{r.emoji} {r.count}</span>
                              ))}
                              
                              {!isLocked && (
                                  <div className="flex items-center gap-1 ml-1">
                                      <button onClick={() => setActiveReactionCommentId(activeReactionCommentId === cid ? null : cid)} className="text-gray-400 hover:text-gray-600 bg-white/40 rounded-full p-1"><Plus size={10}/></button>
                                      {activeReactionCommentId === cid && (
                                          <div className="flex gap-1 bg-white/80 rounded-full px-2 py-0.5 border border-white/50 shadow-sm animate-in fade-in slide-in-from-left-2">
                                              {['❤️','👍','😂','😲'].map(emj => (
                                                  <button key={emj} onClick={() => { toggleCommentReaction(cid, emj); setActiveReactionCommentId(null); }} className="hover:scale-125 transition-transform text-xs">{emj}</button>
                                              ))}
                                          </div>
                                      )}
                                  </div>
                              )}
                          </div>
                        </div>
                    );
                  })}
                  {(!task.comments || task.comments.length === 0) && <p className="text-xs text-gray-500 italic">No hay comentarios.</p>}
                </div>
                
                {!isLocked ? (
                  <form onSubmit={handleAddComment} className="relative z-10 flex flex-col gap-2">
                    <div className="flex gap-2 items-center bg-white/30 backdrop-blur-md border border-white/50 rounded-2xl px-2 py-1 focus-within:ring-2 focus-within:ring-blue-400/50 transition-all shadow-inner">
                      
                      <button type="button" onClick={() => setShowEmojiPicker(!showEmojiPicker)} className="p-2 text-gray-500 hover:text-blue-600 transition">
                          <SmileIcon size={20} />
                      </button>

                      {showEmojiPicker && (
                          <div className="absolute bottom-full left-0 mb-2 bg-white/90 backdrop-blur-xl border border-white/40 shadow-xl rounded-2xl p-2 grid grid-cols-5 gap-2 z-50">
                              {COMMENT_EMOJIS.map(emj => (
                                  <button key={emj} type="button" onClick={() => {setCommentText(prev => prev + emj); setShowEmojiPicker(false);}} className="text-lg hover:scale-125 transition-transform">{emj}</button>
                              ))}
                          </div>
                      )}

                      <input 
                        value={commentText} onChange={(e) => setCommentText(e.target.value)} 
                        placeholder="Escribe un comentario..." 
                        className="flex-1 bg-transparent border-none outline-none py-2 text-sm text-gray-900 placeholder-gray-500" 
                      />
                      
                      <button type="submit" disabled={isProcessing} className="p-2 text-blue-600 hover:bg-blue-100 rounded-xl transition-all disabled:opacity-50">
                          {isProcessing ? <Loader2 className="animate-spin" size={20} /> : <ArrowRightIcon size={20} />}
                      </button>
                    </div>

                    {role === 'teacher' && (
                      <div className="flex gap-2 justify-start mt-1">
                        <button type="button" onClick={() => handleTranslate('Inglés')} disabled={isProcessing} title="Traducir a Inglés" className="bg-white/50 text-gray-800 border border-white/60 px-3 py-1 rounded-lg text-base shadow-sm hover:bg-white/80 transition-all flex items-center justify-center disabled:opacity-50">🇺🇸</button>
                        <button type="button" onClick={() => handleTranslate('Francés')} disabled={isProcessing} title="Traducir a Francés" className="bg-white/50 text-gray-800 border border-white/60 px-3 py-1 rounded-lg text-base shadow-sm hover:bg-white/80 transition-all flex items-center justify-center disabled:opacity-50">🇫🇷</button>
                      </div>
                    )}
                  </form>
                ) : (
                  <p className="text-sm font-bold text-red-600 bg-red-100/50 p-3 rounded-xl border border-red-200">🔒 La interacción para esta tarea ha sido bloqueada.</p>
                )}
              </div>
            </div>
          );
        };

        function App() {
          const [hasEntered, setHasEntered] = useState(false); 
          const [loginType, setLoginType] = useState(null); 
          const [loggedInUser, setLoggedInUser] = useState(""); 
          const [loggedInName, setLoggedInName] = useState(""); 
          const [userMappings, setUserMappings] = useState({}); 
          
          const [user, setUser] = useState(null);
          const [role, setRole] = useState('student');
          const [activeTab, setActiveTab] = useState('tasks');
          const [loginError, setLoginError] = useState("");
          
          const [isDarkMode, setIsDarkMode] = useState(() => window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);

          useEffect(() => {
            const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            const handleChange = (e) => setIsDarkMode(e.matches);
            mediaQuery.addEventListener('change', handleChange);
            return () => mediaQuery.removeEventListener('change', handleChange);
          }, []);

          const [showSugModal, setShowSugModal] = useState(false);
          const [sugText, setSugText] = useState("");
          const [isSugLoading, setIsSugLoading] = useState(false);
          
          const [toastMessage, setToastMessage] = useState("");
          const showMessage = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(""), 5000); };

          const getToday = () => new Date().toISOString().split('T')[0];
          
          const [postType, setPostType] = useState('task'); 
          const [taskTitle, setTaskTitle] = useState("");
          const [taskDesc, setTaskDesc] = useState("");
          const [taskDate, setTaskDate] = useState(getToday());
          const [taskTime, setTaskTime] = useState("23:59");
          const [allowLate, setAllowLate] = useState(false);
          
          const [isAiLoading, setIsAiLoading] = useState(false);
          const [prevTaskTitle, setPrevTaskTitle] = useState("");
          const [prevTaskDesc, setPrevTaskDesc] = useState("");
          const [hasAiModified, setHasAiModified] = useState(false);

          const [reviewTopic, setReviewTopic] = useState("");
          const [reviewCount, setReviewCount] = useState(3);
          const [isReviewLoading, setIsReviewLoading] = useState(false);
          const [activeReview, setActiveReview] = useState(null);
          const [currentSlide, setCurrentSlide] = useState(0);
          
          const [studentQuizAnswer, setStudentQuizAnswer] = useState("");
          const [quizAttempts, setQuizAttempts] = useState(0);
          const [quizFeedback, setQuizFeedback] = useState("");
          const [showQuizAnswer, setShowQuizAnswer] = useState(false);
          const [isEvaluatingQuiz, setIsEvaluatingQuiz] = useState(false);

          const [draftReview, setDraftReview] = useState(null); 
          const [slideInstructions, setSlideInstructions] = useState({}); 
          const [loadingSlides, setLoadingSlides] = useState({}); 

          const [isChatOpen, setIsChatOpen] = useState(false); 
          const [botTrainingInfo, setBotTrainingInfo] = useState("");
          const [botInfoList, setBotInfoList] = useState([]); 
          const [chatHistory, setChatHistory] = useState([]);
          const [chatInput, setChatInput] = useState("");
          const [isChatLoading, setIsChatLoading] = useState(false);

          const [tasks, setTasks] = useState([]);
          const [syllabus, setSyllabus] = useState([]);
          const [evaluations, setEvaluations] = useState([]);
          const [grades, setGrades] = useState([]);
          const [suggestions, setSuggestions] = useState([]);
          const [alerts, setAlerts] = useState([]);
          const [reviews, setReviews] = useState([]); 

          const callGemini = async (promptText) => {
            try {
              const res = await fetch('/api/gemini', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ promptText: promptText }) });
              if (!res.ok) { showMessage(`❌ Error de conexión.`); return ""; }
              const data = await res.json();
              return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
            } catch (error) { return ""; }
          };

          const handleGenerateReview = async (e) => {
            e.preventDefault();
            if (!reviewTopic) return;
            setIsReviewLoading(true);
            const prompt = `Actúa como un profesor de inglés. Crea una presentación de repaso sobre: "${reviewTopic}". Genera exactamente ${reviewCount} diapositivas. Usa EMOJIS. Devuelve ÚNICAMENTE un JSON válido: [ { "type": "info", "title": "Título con emoji", "content": "Texto del párrafo." }, { "type": "quiz", "title": "Pregunta rápida 🤔", "question": "¿Qué verbo falta aquí?", "answer": "Falta el verbo 'is'." } ]`;
            try {
              const result = await callGemini(prompt);
              if (!result) { setIsReviewLoading(false); return; }
              const cleanedJson = result.replace(/```json/gi, '').replace(/```/gi, '').trim();
              const generatedSlides = JSON.parse(cleanedJson);
              generatedSlides.forEach((s, idx) => { s.gradient = SLIDE_GRADIENTS[idx % SLIDE_GRADIENTS.length]; });
              setDraftReview({ topic: generatedSlides[0]?.title || "Repaso", slides: generatedSlides });
              setReviewTopic("");
            } catch (err) { showMessage("Error en IA."); }
            setIsReviewLoading(false);
          };

          const handleRegenerateSingleSlide = async (index) => {
            const instruction = slideInstructions[index];
            if (!instruction) return showMessage("Escribe instrucción.");
            setLoadingSlides(prev => ({ ...prev, [index]: true }));
            const prompt = `Modifica la diapositiva basándote en: "${instruction}". Diapositiva: ${JSON.stringify(draftReview.slides[index])} Devuelve ÚNICAMENTE un JSON válido (info o quiz).`;
            try {
              const result = await callGemini(prompt);
              if (!result) { setLoadingSlides(prev => ({ ...prev, [index]: false })); return; }
              const regeneratedSlide = JSON.parse(result.replace(/```json/gi, '').replace(/```/gi, '').trim());
              regeneratedSlide.gradient = draftReview.slides[index].gradient;
              const newSlides = [...draftReview.slides]; newSlides[index] = regeneratedSlide;
              setDraftReview({ ...draftReview, slides: newSlides });
              setSlideInstructions({...slideInstructions, [index]: ""});
            } catch (err) { showMessage("Error."); }
            setLoadingSlides(prev => ({ ...prev, [index]: false }));
          };

          const handlePublishDraft = async () => {
            if (!draftReview) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reviews'), { topic: draftReview.topic, slides: draftReview.slides, createdAt: Date.now() });
            setDraftReview(null); showMessage("✅ Repaso publicado.");
          };

          const handleQuizSubmit = async (e) => {
            e.preventDefault();
            if (!studentQuizAnswer.trim()) return;
            setIsEvaluatingQuiz(true);
            const currentAttempt = quizAttempts + 1; setQuizAttempts(currentAttempt);
            const activeSlide = activeReview.slides[currentSlide];

            if (currentAttempt >= 3) {
              setQuizFeedback("¡Buen esfuerzo! 🌟 Aquí tienes la respuesta.");
              setShowQuizAnswer(true); setIsEvaluatingQuiz(false); return;
            }
            const prompt = `Un estudiante responde un quiz de inglés. Pregunta: "${activeSlide.question}". Esperada: "${activeSlide.answer}". Respuesta estudiante: "${studentQuizAnswer}". Evalúa si es correcta. Responde ÚNICAMENTE con JSON: {"isCorrect": true/false, "feedback": "Mensaje animando o felicitando"}`;
            try {
              const res = await callGemini(prompt);
              if (!res) { setIsEvaluatingQuiz(false); return; }
              const json = JSON.parse(res.replace(/```json/gi, '').replace(/```/gi, '').trim());
              setQuizFeedback(json.feedback); if(json.isCorrect) setShowQuizAnswer(true);
            } catch(err) { setQuizFeedback("Error al revisar ✨"); }
            setIsEvaluatingQuiz(false);
          };

          const handleSubmitSuggestion = async (e) => {
            e.preventDefault();
            if (!sugText) return;
            setIsSugLoading(true);
            const prompt = `Analiza la sugerencia. Si contiene ofensas, responde "RECHAZADO". Si es constructiva, reescríbela formalmente para la profesora. Devuelve SÓLO la versión mejorada o "RECHAZADO".\n\nTexto: ${sugText}`;
            const result = await callGemini(prompt);
            if (!result) { setIsSugLoading(false); return; }

            if (result.trim() === "RECHAZADO") {
              showMessage("⚠️ Comentario bloqueado.");
              await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'alerts'), { studentName: loggedInName, originalText: sugText, createdAt: Date.now() });
            } else {
              await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'suggestions'), { studentName: loggedInName, text: result, createdAt: Date.now() });
              showMessage("✅ Sugerencia enviada."); setShowSugModal(false); setSugText("");
            }
            setIsSugLoading(false);
          };

          // --- SISTEMA DE LOGIN INVISIBLE ---
          const handleLogin = async (e) => {
            e.preventDefault();
            const rawUser = e.target.username.value.trim(); 
            const password = e.target.password.value;
            const cleanUser = rawUser.toLowerCase().replace('@', '');
            
            // Primero consultamos si el usuario existe en nuestra BD oculta (o en el fallback)
            let targetEmail = "";
            let expectedRole = "";
            let targetName = "";

            if (userMappings[cleanUser]) {
                targetEmail = userMappings[cleanUser].email;
                expectedRole = userMappings[cleanUser].role;
                targetName = userMappings[cleanUser].fullName;
            } else if (FALLBACK_MAP[cleanUser]) {
                targetEmail = FALLBACK_MAP[cleanUser].email;
                expectedRole = FALLBACK_MAP[cleanUser].role;
                targetName = FALLBACK_MAP[cleanUser].name;
            } else {
                setLoginError("Ese usuario no está registrado en el directorio.");
                return;
            }

            if (expectedRole !== loginType) {
                setLoginError(`Ese usuario no es ${loginType === 'teacher' ? 'docente' : 'estudiante'}.`);
                return;
            }

            try {
                // Validación final en Firebase Auth
                await signInWithEmailAndPassword(auth, targetEmail, password);
                setLoginError("");
                // Los estados se actualizarán en onAuthStateChanged
            } catch (error) {
                setLoginError("Contraseña incorrecta.");
            }
          };

          const handleAiTranslate = async (lang) => {
            if (!taskDesc && !taskTitle) return showMessage("Escribe algo para traducir primero.");
            setPrevTaskTitle(taskTitle); setPrevTaskDesc(taskDesc); setIsAiLoading(true);
            const prompt = `Traduce al ${lang}:\nTITULO: [Título traducido]\nDESCRIPCION: [Descripción traducida]\n\nTítulo: ${taskTitle}\nDescripción: ${taskDesc}`;
            const result = await callGemini(prompt);
            if (!result) { setIsAiLoading(false); return; }
            const titleMatch = result.match(/(?:T[IÍ]TULO|TITLE|TITULO)\s*[:\-]?\s*\*?\*?\s*(.*)/i);
            const descMatch = result.match(/(?:DESCRIPCI[OÓ]N|DESCRIPTION|DESCRIPCION)\s*[:\-]?\s*\*?\*?\s*([\s\S]*)/i);
            if (titleMatch && descMatch) { setTaskTitle(titleMatch[1].replace(/\*/g, '').trim()); setTaskDesc(descMatch[1].trim()); } else { setTaskDesc(result); }
            setHasAiModified(true); setIsAiLoading(false);
          };

          const handleLogout = async () => {
            if (role === 'student' && user) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'chatbot', 'history'));
                } catch(e) { console.error(e); }
            }
            await signOut(auth);
            setHasEntered(false);
            setRole('student');
            setLoggedInUser("");
            setLoggedInName("");
          };

          const sendChatMessage = async (e) => {
              e.preventDefault();
              if (!chatInput.trim()) return;
              const userMsg = chatInput.trim();
              setChatInput("");
              setIsChatLoading(true);

              const newHistory = [...chatHistory, { role: 'user', text: userMsg }];
              setChatHistory(newHistory);

              const prompt = `Rol: Eres el asistente virtual de la Profesora Gina (English TECH).
              Reglas: Eres muy amigable, usas emojis, y respondes de forma EXTREMADAMENTE concisa, fácil de entender y rápida para los estudiantes.
              Información clave dada por la profesora:
              ${botInfoList.map(i => "- " + i.text).join('\n')}
              
              Historial:
              ${newHistory.map(m => `${m.role === 'user' ? 'Estudiante' : 'Tú'}: ${m.text}`).join('\n')}
              Estudiante: ${userMsg}
              Tú (Responde directo y amigable):`;

              const reply = await callGemini(prompt);
              const finalHistory = [...newHistory, { role: 'bot', text: reply || "Lo siento, no me pude conectar con la profesora en este momento." }];
              
              await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'chatbot', 'history'), { messages: finalHistory });
              setIsChatLoading(false);
          };

          // --- ESTADOS DE AUTENTICACIÓN ---
          useEffect(() => {
            // Leer el directorio completo de mappings desde Firestore sin necesidad de estar logueado para que funcione el login
            const uMappings = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'userMappings'), s => {
                const maps = {};
                s.docs.forEach(d => { maps[d.id] = d.data(); });
                setUserMappings(maps);
            });

            const unsubscribe = onAuthStateChanged(auth, (u) => {
                setUser(u);
                if (u && u.email) {
                    // Buscar el usuario en los mappings o en el fallback
                    let foundKey = Object.keys(userMappings).find(k => userMappings[k].email === u.email);
                    if (!foundKey) foundKey = Object.keys(FALLBACK_MAP).find(k => FALLBACK_MAP[k].email === u.email);

                    if (foundKey) {
                        const data = userMappings[foundKey] || FALLBACK_MAP[foundKey];
                        setRole(data.role);
                        setLoggedInUser(data.role === 'teacher' ? 'GinaDocente' : `@${foundKey}`);
                        setLoggedInName(data.role === 'teacher' ? 'La profe' : data.fullName || data.name);
                        setHasEntered(true);
                        setLoginType(null);
                    }
                }
            });
            return () => { unsubscribe(); uMappings(); };
          }, [userMappings]); // Dependencia necesaria para actualizar cuando userMappings cargue

          useEffect(() => {
            if (!user) return;
            const base = ['artifacts', appId, 'public', 'data'];
            const uTasks = onSnapshot(collection(db, ...base, 'tasks'), s => setTasks(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.createdAt - a.createdAt)));
            const uSyllabus = onSnapshot(collection(db, ...base, 'syllabus'), s => setSyllabus(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => a.week - b.week)));
            const uEvals = onSnapshot(collection(db, ...base, 'evaluations'), s => setEvaluations(s.docs.map(d => ({ id: d.id, ...d.data() }))));
            const uGrades = onSnapshot(collection(db, ...base, 'grades'), s => setGrades(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.createdAt - a.createdAt)));
            const uSug = onSnapshot(collection(db, ...base, 'suggestions'), s => setSuggestions(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.createdAt - a.createdAt)));
            const uAlerts = onSnapshot(collection(db, ...base, 'alerts'), s => setAlerts(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.createdAt - a.createdAt)));
            const uReviews = onSnapshot(collection(db, ...base, 'reviews'), s => setReviews(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.createdAt - a.createdAt)));
            const uBotSettings = onSnapshot(doc(db, ...base, 'settings', 'bot'), d => setBotInfoList(d.data()?.infoList || []));
            const uChat = onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'chatbot', 'history'), d => setChatHistory(d.data()?.messages || []));

            return () => { uTasks(); uSyllabus(); uEvals(); uGrades(); uSug(); uAlerts(); uReviews(); uBotSettings(); uChat(); };
          }, [user]);

          // --- VISTAS ---
          const renderTasks = () => (
            <div className="space-y-6">
              <h2 className="text-3xl font-bold text-gray-800 mb-6 flex items-center gap-2 drop-shadow-sm"><BookOpen className="text-[#AD3333]" /> Muro de Clase</h2>
              
              {role === 'teacher' && (
                <div className={`${glassCard} mb-8 flex flex-col gap-4`}>
                  <div className="flex gap-2 mb-2 bg-white/40 p-1 rounded-xl w-fit border border-white/50">
                      <button onClick={() => setPostType('task')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${postType === 'task' ? 'bg-white shadow-sm text-[#AD3333]' : 'text-gray-600 hover:text-gray-900'}`}>Tarea nueva</button>
                      <button onClick={() => setPostType('post')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${postType === 'post' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-600 hover:text-gray-900'}`}>Nueva publicación</button>
                  </div>

                  <input value={taskTitle} onChange={(e) => setTaskTitle(e.target.value)} placeholder={postType === 'task' ? "Título de la tarea..." : "Título de la publicación..."} className={glassInput} required />
                  <textarea value={taskDesc} onChange={(e) => setTaskDesc(e.target.value)} placeholder="Instrucciones detalladas o escribe una idea y usa la IA para potenciarla..." className={`${glassInput} h-32 resize-none`} required />
                  
                  <div className="flex flex-wrap gap-2 mb-2 items-center">
                    <button type="button" onClick={async () => {
                        if (!taskDesc && !taskTitle) return showMessage("Escribe una idea en la descripción primero.");
                        setPrevTaskTitle(taskTitle); setPrevTaskDesc(taskDesc); setIsAiLoading(true);
                        const result = await callGemini(`Mejora esta publicación: Título: ${taskTitle}\nDescripción: ${taskDesc}\nDevuelve SÓLO en formato:\nTITULO: [Título nuevo]\nDESCRIPCION: [Descripción detallada]`);
                        if (!result) { setIsAiLoading(false); return; }
                        const titleMatch = result.match(/(?:T[IÍ]TULO|TITLE|TITULO)\s*[:\-]?\s*\*?\*?\s*(.*)/i);
                        const descMatch = result.match(/(?:DESCRIPCI[OÓ]N|DESCRIPTION|DESCRIPCION)\s*[:\-]?\s*\*?\*?\s*([\s\S]*)/i);
                        if (titleMatch && descMatch) { setTaskTitle(titleMatch[1].replace(/\*/g, '').trim()); setTaskDesc(descMatch[1].trim()); } else { setTaskDesc(result); }
                        setHasAiModified(true); setIsAiLoading(false);
                    }} disabled={isAiLoading} className="bg-gradient-to-r from-purple-500 to-indigo-500 text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow-md hover:shadow-lg transition-all flex items-center gap-1 disabled:opacity-50"><Sparkles size={16} /> Potenciar</button>
                    
                    <button type="button" onClick={async () => {
                        if (!taskDesc) return showMessage("Escribe algo en la descripción para corregir.");
                        setPrevTaskTitle(taskTitle); setPrevTaskDesc(taskDesc); setIsAiLoading(true);
                        const result = await callGemini(`Corrige la ortografía y gramática manteniendo el idioma original. Devuelve SÓLO el texto corregido:\n\n${taskDesc}`);
                        if (!result) { setIsAiLoading(false); return; }
                        setTaskDesc(result); setHasAiModified(true); setIsAiLoading(false);
                    }} disabled={isAiLoading} className="bg-white/50 text-gray-800 border border-white/60 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm hover:bg-white/80 transition-all flex items-center gap-1 disabled:opacity-50"><CheckCheck size={16} /> Corregir</button>
                    
                    <button type="button" onClick={() => handleAiTranslate('Inglés')} disabled={isAiLoading} className="bg-white/50 text-gray-800 border border-white/60 px-3 py-1.5 rounded-lg text-lg shadow-sm hover:bg-white/80 transition-all disabled:opacity-50">🇺🇸</button>
                    <button type="button" onClick={() => handleAiTranslate('Francés')} disabled={isAiLoading} className="bg-white/50 text-gray-800 border border-white/60 px-3 py-1.5 rounded-lg text-lg shadow-sm hover:bg-white/80 transition-all disabled:opacity-50">🇫🇷</button>

                    {hasAiModified && <button type="button" onClick={() => { setTaskTitle(prevTaskTitle); setTaskDesc(prevTaskDesc); setHasAiModified(false); }} className="bg-white/50 text-red-600 border border-red-300 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm hover:bg-red-50 transition-all flex items-center gap-1 ml-auto"><Undo2 size={16} /> Deshacer</button>}
                  </div>

                  <div className="flex flex-wrap gap-4 items-center bg-white/30 p-4 rounded-xl border border-white/40">
                    {postType === 'task' && (
                        <>
                            <div><label className="text-xs font-bold text-gray-700 block">Fecha límite</label><input type="date" value={taskDate} onChange={(e) => setTaskDate(e.target.value)} className={`${glassInput} py-2`} required /></div>
                            <div><label className="text-xs font-bold text-gray-700 block">Hora límite</label><input type="time" value={taskTime} onChange={(e) => setTaskTime(e.target.value)} className={`${glassInput} py-2`} required /></div>
                            <label className="flex items-center gap-2 mt-4 cursor-pointer"><input type="checkbox" checked={allowLate} onChange={(e) => setAllowLate(e.target.checked)} className="w-5 h-5 accent-[#AD3333]" /><span className="text-sm font-bold text-gray-800">Permitir entregas tardías</span></label>
                        </>
                    )}
                    
                    <button type="button" onClick={async () => {
                      if(taskTitle && taskDesc) {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), { 
                            type: postType, title: taskTitle, description: taskDesc, dueDate: postType === 'task' ? taskDate : null, dueTime: postType === 'task' ? taskTime : null, allowLate: postType === 'task' ? allowLate : true, createdAt: Date.now(), comments: [], reactions: {} 
                        });
                        setTaskTitle(""); setTaskDesc(""); setTaskDate(getToday()); setTaskTime("23:59"); setHasAiModified(false); setAllowLate(false);
                      } else showMessage("Llena título y descripción.");
                    }} className={`${redButton} ml-auto ${postType === 'post' ? 'mt-0' : 'mt-4'}`}>Publicar</button>
                  </div>
                </div>

                      <div className="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-blue-400/20 rounded-full blur-[120px] pointer-events-none" />
                      
                      <div className={`${glassCard} max-w-md w-full mx-4 flex flex-col items-center gap-8 relative z-10 animate-in fade-in zoom-in duration-500`}>
                          <div className="w-20 h-20 bg-gradient-to-br from-[#AD3333] to-[#8a2828] rounded-2xl flex items-center justify-center text-white font-black text-3xl shadow-xl shadow-[#AD3333]/40 border border-white/20">UP</div>
                          
                          <div className="text-center">
                              <h1 className="text-3xl font-extrabold text-gray-800 drop-shadow-sm mb-1">English TECH</h1>
                              <p className="text-sm font-bold text-[#AD3333]">Universidad de Pamplona</p>
                          </div>

                          <div className="w-full space-y-4">
                              <h2 className="text-xl font-bold text-center text-gray-700 mb-4">Accede</h2>
                              
                              <button 
                                  onClick={() => setLoginType('teacher')}
                                  className="w-full bg-[#AD3333]/90 backdrop-blur-md text-white px-6 py-4 rounded-2xl font-bold shadow-lg shadow-[#AD3333]/30 hover:shadow-[0_0_25px_#AD3333] hover:bg-[#8a2828] transition-all duration-300 border border-white/20"
                              >
                                  Soy docente
                              </button>
                              
                              <button 
                                  onClick={() => setLoginType('student')}
                                  className="w-full bg-blue-600/90 backdrop-blur-md text-white px-6 py-4 rounded-2xl font-bold shadow-lg shadow-blue-600/30 hover:shadow-[0_0_25px_rgba(37,99,235,0.8)] hover:bg-blue-700 transition-all duration-300 border border-white/20"
                              >
                                  Soy estudiante
                              </button>
                          </div>
                      </div>

                      {/* Modal Único de Inicio de Sesión */}
                      {loginType !== null && (
                          <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4 transition-all">
                            <form onSubmit={handleLogin} className={`${glassCard} max-w-sm w-full flex flex-col gap-5 relative animate-in fade-in zoom-in duration-200`}>
                              <button type="button" onClick={() => {setLoginType(null); setLoginError("");}} className="absolute top-4 right-4 text-gray-500 hover:text-gray-800 transition-colors"><X size={24}/></button>
                              <h3 className="text-2xl font-bold text-center text-gray-800 mb-2 drop-shadow-sm">
                                {loginType === 'teacher' ? 'Acceso Docente' : 'Acceso Estudiante'}
                              </h3>
                              <div><label className="text-xs font-bold text-gray-700 ml-2">Usuario</label><input type="text" name="username" placeholder="Ej: @Usuario" className={glassInput} required /></div>
                              <div><label className="text-xs font-bold text-gray-700 ml-2">Contraseña</label><input name="password" type="password" placeholder="••••••••" className={glassInput} required /></div>
                              {loginError && <p className="text-[#AD3333] text-sm text-center font-bold bg-white/50 py-2 rounded-lg">{loginError}</p>}
                              
                              <div className="flex gap-3 mt-2">
                                  <button type="button" onClick={() => {setLoginType(null); setLoginError("");}} className={`${outlineButton} flex-1`}>Volver</button>
                                  <button type="submit" className={`${redButton} flex-1`}>Ingresar</button>
                              </div>
                            </form>
                          </div>
                      )}
                  </div>
              );
          }

          // RENDERIZADO PRINCIPAL DE LA PLATAFORMA (Una vez se accede)
          return (
            <div className={`min-h-screen bg-gradient-to-br ${isDarkMode ? 'from-gray-900 via-slate-900 to-black' : 'from-red-50/80 via-gray-100/90 to-red-100/80'} font-sans relative overflow-hidden transition-colors duration-500 ${isDarkMode ? 'dark-mode' : ''}`}>
              <style>{`
                .dark-mode .text-gray-900 { color: #f9fafb !important; }
                .dark-mode .text-gray-800 { color: #f3f4f6 !important; }
                .dark-mode .text-gray-700 { color: #d1d5db !important; }
                .dark-mode .text-gray-600 { color: #9ca3af !important; }
                .dark-mode .text-gray-500 { color: #6b7280 !important; }
                
                .dark-mode [class*="bg-white/20"] { background-color: rgba(0, 0, 0, 0.4) !important; border-color: rgba(255, 255, 255, 0.1) !important; }
                .dark-mode [class*="bg-white/30"] { background-color: rgba(0, 0, 0, 0.5) !important; border-color: rgba(255, 255, 255, 0.15) !important; }
                .dark-mode [class*="bg-white/40"] { background-color: rgba(0, 0, 0, 0.6) !important; border-color: rgba(255, 255, 255, 0.2) !important; }
                .dark-mode [class*="bg-white/50"] { background-color: rgba(0, 0, 0, 0.7) !important; border-color: rgba(255, 255, 255, 0.25) !important; }
                .dark-mode [class*="bg-white/60"] { background-color: rgba(0, 0, 0, 0.8) !important; border-color: rgba(255, 255, 255, 0.3) !important; }
                .dark-mode [class*="bg-white/80"] { background-color: rgba(0, 0, 0, 0.9) !important; border-color: rgba(255, 255, 255, 0.4) !important; }
                
                .dark-mode [class*="border-white/"] { border-color: rgba(255, 255, 255, 0.2) !important; }
                .dark-mode [class*="bg-red-100/"] { background-color: rgba(153, 27, 27, 0.2) !important; border-color: rgba(220, 38, 38, 0.3) !important; }
                .dark-mode [class*="bg-red-50"] { background-color: rgba(69, 10, 0, 0.4) !important; }
                .dark-mode [class*="text-red-600"] { color: #f87171 !important; }
                .dark-mode [class*="bg-green-100/"] { background-color: rgba(6, 78, 59, 0.4) !important; border-color: rgba(52, 211, 153, 0.3) !important; }
                .dark-mode [class*="text-green-700"] { color: #34d399 !important; }
                .dark-mode [class*="bg-indigo-50/"] { background-color: rgba(49, 46, 129, 0.5) !important; border-color: rgba(129, 140, 248, 0.3) !important; }
                .dark-mode [class*="text-indigo-800"] { color: #818cf8 !important; }

                /* Forzar texto e inputs blancos en modo oscuro */
                .dark-mode input, .dark-mode textarea { color: #ffffff !important; }
                .dark-mode input::placeholder, .dark-mode textarea::placeholder { color: #9ca3af !important; }
                
                /* Margen extra para que la barra inferior en celular no tape el contenido final */
                .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
              `}</style>
              
              <div className="absolute top-[-15%] left-[-10%] w-[50%] h-[50%] bg-[#AD3333]/15 rounded-full blur-[100px] pointer-events-none" />
              <div className="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-blue-300/15 rounded-full blur-[120px] pointer-events-none" />

              {/* BARRA SUPERIOR */}
              <nav className="sticky top-0 z-50 bg-white/20 backdrop-blur-xl border-b border-white/40 px-4 md:px-6 py-4 flex justify-between items-start md:items-center shadow-sm">
                
                {/* Logo, Título y Botón Salir */}
                <div className="flex flex-col items-start gap-1">
                  <div className="flex items-center gap-3">
                    <div className="w-11 h-11 min-w-[44px] bg-gradient-to-br from-[#AD3333] to-[#8a2828] rounded-xl flex items-center justify-center text-white font-extrabold shadow-lg shadow-[#AD3333]/40 border border-white/20">UP</div>
                    <div>
                      <h1 className="text-xl font-extrabold text-gray-800 leading-tight drop-shadow-sm">English TECH</h1>
                      <p className="text-xs text-[#AD3333] font-bold">Universidad de Pamplona</p>
                    </div>
                  </div>
                  {/* Botón de Volver (Cerrar sesión) */}
                  <button onClick={handleLogout} className="flex items-center gap-1 text-xs text-gray-600 hover:text-red-600 font-bold transition-all ml-1 mt-1 bg-white/40 px-2 py-1 rounded-full border border-white/50 shadow-sm">
                    <LogOutIcon size={12} /> Volver
                  </button>
                </div>

                <div className="flex gap-2 items-center mt-2 md:mt-0">
                  {/* MENÚ DE ESCRITORIO */}
                  <div className="hidden md:flex gap-2 items-center">
                    <button onClick={() => setActiveTab('tasks')} className={`${activeTab === 'tasks' ? 'bg-white/60 shadow-md font-bold' : 'hover:bg-white/40 font-medium'} px-4 py-2 rounded-full transition text-sm text-gray-800`}>Asignaciones</button>
                    <button onClick={() => setActiveTab('reviews')} className={`${activeTab === 'reviews' ? 'bg-[#AD3333] text-white shadow-md font-bold' : 'hover:bg-white/40 font-medium'} px-4 py-2 rounded-full transition text-sm text-gray-800 hover:text-gray-900 flex items-center gap-1`}>Repasos</button>
                    <button onClick={() => setActiveTab('syllabus')} className={`${activeTab === 'syllabus' ? 'bg-white/60 shadow-md font-bold' : 'hover:bg-white/40 font-medium'} px-4 py-2 rounded-full transition text-sm text-gray-800`}>Contenidos programáticos</button>
                    <button onClick={() => setActiveTab('evaluations')} className={`${activeTab === 'evaluations' ? 'bg-white/60 shadow-md font-bold' : 'hover:bg-white/40 font-medium'} px-4 py-2 rounded-full transition text-sm text-gray-800`}>Evaluaciones</button>
                    {role === 'teacher' && <button onClick={() => setActiveTab('directory')} className={`${activeTab === 'directory' ? 'bg-[#AD3333] text-white shadow-md font-bold' : 'hover:bg-white/40 font-medium'} px-4 py-2 rounded-full transition text-sm text-gray-800`}>Directorio</button>}
                    <div className="w-px h-6 bg-gray-400 mx-2"></div>
                  </div>
                  
                  {/* Botones siempre visibles */}
                  <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-full bg-white/40 hover:bg-white/60 text-gray-800 transition-all shadow-sm border border-white/50" title="Alternar Modo Oscuro">
                    {isDarkMode ? <Sun size={18} /> : <Moon size={18} />}
                  </button>
                  
                  {role === 'student' ? (
                    <button onClick={() => setShowSugModal(true)} className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-md font-bold px-3 py-2 rounded-full hover:scale-105 transition flex items-center gap-1 text-sm"><Mail size={16}/><span className="hidden sm:inline">Sugerencias</span></button>
                  ) : (
                    <button onClick={() => setActiveTab('inbox')} className={`${activeTab === 'inbox' ? 'bg-[#AD3333] text-white shadow-md font-bold' : 'bg-white/60 hover:bg-white/80 font-bold text-gray-800'} px-3 py-2 rounded-full transition flex items-center gap-1 text-sm`}>
                      <Mail size={16}/><span className="hidden sm:inline">Buzón</span> {alerts.length > 0 && <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse" />}
                    </button>
                  )}
                </div>
              </nav>

              {/* CONTENIDO PRINCIPAL */}
              <main className="max-w-5xl mx-auto p-4 md:p-8 pb-28 md:pb-8 relative z-10">
                {activeTab === 'tasks' && renderTasks()}
                {activeTab === 'reviews' && renderReviews()}
                {activeTab === 'syllabus' && renderSyllabus()}
                {activeTab === 'evaluations' && renderEvaluations()}
                {activeTab === 'directory' && role === 'teacher' && renderDirectory()}
                {activeTab === 'inbox' && role === 'teacher' && renderInbox()}
              </main>

              {/* BARRA INFERIOR (Celulares) */}
              <nav className="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t border-gray-200 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] flex justify-around items-center pt-3 pb-safe md:hidden z-50">
                <button onClick={() => setActiveTab('tasks')} className={`flex flex-col items-center justify-center p-2 rounded-2xl transition-all w-16 h-16 ${activeTab === 'tasks' ? 'bg-gray-800 text-white scale-105 shadow-md' : 'text-gray-500 hover:bg-gray-100'}`}>
                  <NavNotebook size={24} />
                </button>
                <button onClick={() => setActiveTab('reviews')} className={`flex flex-col items-center justify-center p-2 rounded-2xl transition-all w-16 h-16 ${activeTab === 'reviews' ? 'bg-[#AD3333] text-white scale-105 shadow-md' : 'text-gray-500 hover:bg-gray-100'}`}>
                  <NavSlides size={24} />
                </button>
                <button onClick={() => setActiveTab('syllabus')} className={`flex flex-col items-center justify-center p-2 rounded-2xl transition-all w-16 h-16 ${activeTab === 'syllabus' ? 'bg-gray-800 text-white scale-105 shadow-md' : 'text-gray-500 hover:bg-gray-100'}`}>
                  <NavCalendar size={24} />
                </button>
                <button onClick={() => setActiveTab('evaluations')} className={`flex flex-col items-center justify-center p-2 rounded-2xl transition-all w-16 h-16 ${activeTab === 'evaluations' ? 'bg-gray-800 text-white scale-105 shadow-md' : 'text-gray-500 hover:bg-gray-100'}`}>
                  <NavFile size={24} />
                </button>
              </nav>

              {/* ASISTENTE VIRTUAL FLOTANTE (SOLO ESTUDIANTES) */}
              {role === 'student' && hasEntered && (
                  <div className="fixed bottom-24 md:bottom-6 right-4 md:right-6 z-[100] flex flex-col items-end">
                      {isChatOpen && (
                          <div className={`${glassCard} w-[90vw] sm:w-[350px] h-[450px] max-h-[60vh] mb-4 flex flex-col p-4 animate-in slide-in-from-bottom-10 fade-in border border-white/60 shadow-2xl`}>
                              <div className="flex justify-between items-center mb-3 border-b border-gray-300/30 pb-3">
                                  <h3 className="font-bold text-gray-800 flex items-center gap-2">
                                      <CuteBotIcon size={24} className="text-gray-700" /> Asistente de Clase
                                  </h3>
                                  <button onClick={() => setIsChatOpen(false)} className="text-gray-500 hover:text-gray-800 bg-white/40 p-1.5 rounded-full transition-colors"><X size={16}/></button>
                              </div>
                              
                              <div className="flex-1 overflow-y-auto space-y-3 pr-2 mb-3">
                                  <div className="bg-blue-100 text-blue-900 text-xs p-3 rounded-xl rounded-tl-none w-10/12 shadow-sm">
                                      ¡Hola! 👋 Soy el asistente virtual. ¿Tienes alguna pregunta sobre el cronograma o las fechas de la clase?
                                  </div>
                                  {chatHistory.map((m, i) => (
                                      <div key={i} className={`text-xs p-3 rounded-xl max-w-[85%] shadow-sm ${m.role === 'user' ? 'bg-gray-800 text-white ml-auto rounded-tr-none' : 'bg-blue-100 text-blue-900 rounded-tl-none'}`}>
                                          {m.text}
                                      </div>
                                  ))}
                                  {isChatLoading && (
                                      <div className="bg-blue-100/50 p-3 rounded-xl rounded-tl-none w-fit flex gap-1 items-center">
                                          <span className="w-1.5 h-1.5 bg-blue-600 rounded-full animate-bounce"></span>
                                          <span className="w-1.5 h-1.5 bg-blue-600 rounded-full animate-bounce" style={{animationDelay: '150ms'}}></span>
                                          <span className="w-1.5 h-1.5 bg-blue-600 rounded-full animate-bounce" style={{animationDelay: '300ms'}}></span>
                                      </div>
                                  )}
                              </div>

                              <form onSubmit={sendChatMessage} className="flex gap-2">
                                  <input 
                                      value={chatInput} onChange={e => setChatInput(e.target.value)} 
                                      placeholder="Escribe tu pregunta..." 
                                      className={`${glassInput} py-2 px-3 text-xs bg-white/60`}
                                  />
                                  <button type="submit" disabled={isChatLoading} className="bg-gray-800 text-white p-2.5 rounded-xl hover:bg-black disabled:opacity-50 transition shadow-md">
                                      <ArrowRightIcon size={16}/>
                                  </button>
                              </form>
                          </div>
                      )}
                      
                      <button 
                          onClick={() => setIsChatOpen(!isChatOpen)} 
                          className="w-16 h-16 rounded-full bg-white/40 backdrop-blur-2xl border border-white/60 shadow-[0_8px_32px_0_rgba(0,0,0,0.2)] flex items-center justify-center hover:scale-110 transition-transform focus:outline-none text-gray-700"
                      >
                          <CuteBotIcon size={32} />
                      </button>
                  </div>
              )}

              {toastMessage && (
                <div className="fixed bottom-24 md:bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900/95 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-2xl z-[200] font-medium text-sm text-center border border-gray-700 whitespace-nowrap">
                  {toastMessage}
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
